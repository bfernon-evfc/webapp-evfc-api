    </div>

    ${chainHTML}
    ${handoffContextHTML}
    ${m5ContextHTML}
    ${m3ContextHTML}
    ${modelRecoBanner(skill.id)}

    <div class="input-grid">
      ${fieldsHTML}
    </div>

    <div class="generation-controls">
      <div class="token-control">
        <label for="field_max_tokens">Longueur maximale du livrable</label>
        <select id="field_max_tokens" onchange="setMaxTokensForCurrentSkill(this.value)">
          ${tokenOptionsHTML}
        </select>
        <span class="input-hint">Augmente cette valeur pour les scénarios longs, bibliothèques complètes ou exports techniques.</span>
      </div>
      <div class="temperature-control">
        <label for="field_temperature">Créativité du modèle</label>
        <select id="field_temperature" onchange="setTemperatureForCurrentSkill(this.value)">
          ${temperatureOptionsHTML}
        </select>
        <span class="input-hint">Baisse-la pour des sorties strictes, augmente-la pour des variantes plus créatives.</span>
      </div>
      <button
        class="btn-dev-reco ${isDevRecoSelected ? 'selected' : ''}"
        id="btn-dev-reco"
        onclick="applyDevRecommendedSettings()"
        data-tooltip="Charge les valeurs recommandées par le développeur pour ce module : longueur du livrable et créativité du modèle.">
        ${isDevRecoSelected ? '✅ Valeurs recommandées' : '💡 Valeurs recommandées'}
      </button>
      <button class="btn-copy-prompt" onclick="copyPromptBeforeGeneration()">📋 Copier le prompt</button>
    </div>

    <button class="btn-generate" id="btn-gen" onclick="generate()">
      <div class="spinner"></div>
      <span class="btn-text">⚡ Générer avec l'IA</span>
    </button>

    ${resultCache[skill.id] ? `
    <div class="restore-banner" id="restore-banner">
      <span>📄 Un livrable a déjà été généré pour ce module.</span>
      <button class="restore-btn" onclick="restoreCachedResult()">Revoir le livrable</button>
    </div>` : ''}

    <div id="result-zone"></div>
  `;

  applyHandoffToCurrentPanel(skill);

  // ── M5 : pré-remplir le champ compétence depuis le cache M4 ──
  if (skill.id === 'm5' && hasCachedM4) {
    const compField = document.getElementById('field_competence');
    if (compField && !compField.value) {
      compField.value = extractCompetenceFromCache('m4', 800);
      compField.style.borderColor = 'rgba(217,119,6,0.6)';
      compField.title = 'Pré-rempli depuis le scénario M4';
    }
  }
}

// ─────────────────────────────────────────────
// CACHE EXTRACTION HELPERS
// ─────────────────────────────────────────────

// Generic: clean markdown text from a cached result, up to maxLen chars
function extractCompetenceFromCache(skillId, maxLen = 600) {
  const raw = resultCache[skillId] || '';
  return raw
    .replace(/#{1,4} /g, '')
    .replace(/\*\*/g, '')
    .replace(/^\s*[-*]\s/gm, '')
    .replace(/`{1,3}[^`]*`{1,3}/g, '')
    .replace(/\n{3,}/g, '\n\n')
    .trim()
    .slice(0, maxLen);
}

function stripMarkdownInline(value) {
  return String(value || '')
    .replace(/\*\*/g, '')
    .replace(/^>\s*/, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function cleanCompetenceCandidate(value) {
  return stripMarkdownInline(value)
    .replace(/^(?:à\s+l['’]issue[^:]*:\s*)/i, '')
    .replace(/^(?:l['’]apprenant\s+)?(?:sera|seront|être|etre)\s+capable[s]?\s+de\s*:?\s*/i, '')
    .replace(/^[:\-–—\s]+/, '')
    .trim();
}

function extractCapableObjective(text) {
  const lines = String(text || '').split(/\r?\n/);
  for (let i = 0; i < lines.length; i++) {
    if (!/(?:sera|seront|être|etre)\s+capable[s]?\s+de/i.test(lines[i])) continue;

    const sameLine = cleanCompetenceCandidate(lines[i]);
    if (sameLine.length >= 10 && !/^(?:sera|seront|être|etre)\s+capable/i.test(sameLine)) return sameLine;

    for (let j = i + 1; j < Math.min(lines.length, i + 5); j++) {
      const nextLine = cleanCompetenceCandidate(lines[j]);
      if (nextLine.length >= 10) return nextLine;
    }
  }
  return '';
}

function extractM1CompetenceForM3(text) {
  const tableMatch = text.match(/\|\s*(?:\*\*)?comp[ée]tence\s+cible(?:\*\*)?\s*\|\s*([^|\n]{10,})\|/i);
  if (tableMatch) return cleanCompetenceCandidate(tableMatch[1]).slice(0, 300);

  const directMatch = text.match(/(?:comp[ée]tence\s+cible|comp[ée]tence\s+observable\s+cible)[^:\n|]*[:|]\s*([^\n|]{10,})/i);
  if (directMatch) return cleanCompetenceCandidate(directMatch[1]).slice(0, 300);

  const capableObjective = extractCapableObjective(text);
  if (capableObjective) return capableObjective.slice(0, 300);

  const operationalBlock = text.match(/objectif\s+op[ée]rationnel[\s\S]{0,500}/i);
  if (operationalBlock) {
    const blockMatch = operationalBlock[0].match(/>\s*([^>\n]*(?:installer|configurer|préparer|preparer|réaliser|realiser|diagnostiquer|créer|creer|produire|mettre|utiliser)[^\n]{10,})/i);
    if (blockMatch) return cleanCompetenceCandidate(blockMatch[1]).slice(0, 300);
  }

  return '';
}

function extractShortField(text, patterns, maxLen = 300) {
  const raw = String(text || '');
  for (const pattern of patterns) {
    const match = raw.match(pattern);
    if (match) return cleanCompetenceCandidate(match[1] || match[0]).slice(0, maxLen);
  }
  return '';
}

function extractHandoffCompetence(sourceId, sourceText, sourceInputs = {}, maxLen = 300) {
  if (sourceInputs.competence) return stripMarkdownInline(sourceInputs.competence).slice(0, maxLen);
  if (sourceInputs.referentiel) return stripMarkdownInline(sourceInputs.referentiel).slice(0, maxLen);
  if (sourceInputs.domaine) return stripMarkdownInline(sourceInputs.domaine).slice(0, maxLen);
  if (sourceInputs.type_formation) return stripMarkdownInline(sourceInputs.type_formation).slice(0, maxLen);
  if (sourceInputs.objectif) return stripMarkdownInline(sourceInputs.objectif).slice(0, maxLen);
  if (sourceId === 'm1') return extractM1CompetenceForM3(sourceText).slice(0, maxLen);

  return extractShortField(sourceText, [
    /\|\s*(?:\*\*)?comp[ée]tence[^|]*(?:\*\*)?\s*\|\s*([^|\n]{10,})\|/i,
    /comp[ée]tence[^:\n]*:\s*([^\n]{10,})/i,
    /objectif\s+op[ée]rationnel[^:\n]*:\s*([^\n]{10,})/i,
    /(?:sera|seront)\s+capable[s]?\s+de\s*:?\s*(?:\n\s*>?\s*)?([^\n]{10,})/i
  ], maxLen) || extractCompetenceFromCache(sourceId, maxLen);
}

function extractHandoffContext(sourceText, sourceInputs = {}, maxLen = 300) {
  if (sourceInputs.contexte) return stripMarkdownInline(sourceInputs.contexte).slice(0, maxLen);
  if (sourceInputs.secteur) return `Secteur : ${stripMarkdownInline(sourceInputs.secteur)}`.slice(0, maxLen);
  if (sourceInputs.public) return `Public : ${stripMarkdownInline(sourceInputs.public)}`.slice(0, maxLen);
  return extractShortField(sourceText, [
    /contexte[^:\n]*:\s*([^\n]{10,})/i,
    /public[^:\n]*:\s*([^\n]{5,})/i,
    /entreprise[^:\n]*:\s*([^\n]{5,})/i
  ], maxLen);
}

function buildDefaultHandoffContext(sourceId, targetId, competence, sourceInputs = {}, maxLen = 320) {
  if (sourceId === 'm3' && targetId === 'm4') {
    const phase = sourceInputs.phase ? ` Phase EVFC évaluée : ${stripMarkdownInline(sourceInputs.phase)}.` : '';
    const topic = competence ? ` sur "${stripMarkdownInline(competence)}"` : '';
    return `Mise en situation professionnelle à construire à partir du QCM M3${topic}.${phase} Transformer les acquis vérifiés en tâche terrain observable pour la phase FAIRE.`.slice(0, maxLen);
  }

  if (targetId === 'm4' && competence) {
    return `Contexte professionnel à préciser : transformer "${stripMarkdownInline(competence)}" en situation terrain réaliste et observable pour la phase FAIRE.`.slice(0, maxLen);
  }

  return '';
}

function extractHandoffBlocage(sourceText, sourceInputs = {}, maxLen = 700) {
  if (sourceInputs.blocage) return stripMarkdownInline(sourceInputs.blocage).slice(0, maxLen);
  return extractShortField(sourceText, [
    /blocage[^:\n]*:\s*([^\n]{10,})/i,
    /difficult[ée][^:\n]*:\s*([^\n]{10,})/i,
    /point[s]? de vigilance[^:\n]*:\s*([^\n]{10,})/i,
    /erreur[s]? probable[s]?[^:\n]*:\s*([^\n]{10,})/i
  ], maxLen);
}

function buildHandoffFields(sourceId, targetId, sourceText, sourceInputs = {}) {
  const fields = {};
  const competence = extractHandoffCompetence(sourceId, sourceText, sourceInputs, targetId === 'm5' ? 900 : 320);
  const contexte = extractHandoffContext(sourceText, sourceInputs, 320);

  if (targetId === 'm1') {
    if (competence) fields.competence = competence;
    if (sourceInputs.public) fields.public = stripMarkdownInline(sourceInputs.public);
    if (sourceInputs.duree_totale) fields.duree = stripMarkdownInline(sourceInputs.duree_totale);
    if (sourceInputs.modalite) fields.modalite = sourceInputs.modalite;
    if (contexte) fields.contexte = contexte;
  }

  if (targetId === 'm3') {
    const extracted = sourceId ? extractForM3(sourceId) : {};
    fields.competence = extracted.competence || competence;
    fields.phase = extracted.phase || sourceInputs.phase || 'Écouter + Voir';
  }

  if (targetId === 'm4') {
    if (competence) fields.competence = competence;
    fields.contexte = contexte || buildDefaultHandoffContext(sourceId, targetId, competence, sourceInputs, 320);
  }

  if (targetId === 'm5') {
    if (sourceId === 'm4') fields.competence = extractCompetenceFromCache('m4', 900);
    else if (competence) fields.competence = competence;
  }

  if (targetId === 'm6') {
    const blocage = extractHandoffBlocage(sourceText, sourceInputs, 700);
    fields.blocage = blocage || `À partir du livrable ${sourceId.toUpperCase()}, identifier une difficulté apprenant ou un point de remédiation à traiter.`;
    if (sourceInputs.phase || /faire/i.test(sourceText)) fields.phase_evfc = sourceInputs.phase || 'Faire';
    if (sourceInputs.public) fields.profil = stripMarkdownInline(sourceInputs.public);
  }

  if (targetId === 'm7') {
    fields.objectif = `Automatiser l'exploitation ou la diffusion du livrable ${sourceId.toUpperCase()}.`;
    fields.outils = /Google Forms|Apps Script|QCM|CSV/i.test(sourceText) ? 'Google Sheets, Google Forms, Apps Script' : '';
  }

  return Object.fromEntries(Object.entries(fields).filter(([, value]) => value !== undefined && value !== null && String(value).trim() !== ''));
}

function persistHandoffCache() {
  safeSetLocalStorage(
    STORAGE_KEYS.handoffCache,
    JSON.stringify(handoffCache),
    'Cache local plein ou indisponible : les préchargements resteront disponibles seulement dans cette session.'
  );
}

function storeHandoffsForResult(sourceSkill, sourceText, sourceInputs = {}) {
  const targetIds = resolveNextSkillsForResult(sourceText, sourceSkill).map(s => s.id);
  const prepared = [];

  targetIds.forEach(targetId => {
    if (targetId === sourceSkill.id) return;
    const fields = buildHandoffFields(sourceSkill.id, targetId, sourceText, sourceInputs);
    if (Object.keys(fields).length === 0) return;

    handoffCache[targetId] = {
      sourceId: sourceSkill.id,
      sourceModule: sourceSkill.module,
      sourceName: sourceSkill.name,
      targetId,
      fields,
      createdAt: new Date().toISOString()
    };
    prepared.push(targetId);
  });

  if (prepared.length) persistHandoffCache();
  return prepared;
}

function applyHandoffToCurrentPanel(skill) {
  const handoff = handoffCache[skill.id];
  if (!handoff || !handoff.fields) return false;

  let applied = 0;
  Object.entries(handoff.fields).forEach(([fieldId, value]) => {
    const el = document.getElementById(`field_${fieldId}`);
    if (!el || String(el.value || '').trim()) return;
    if (el.tagName === 'SELECT') {
      const options = Array.from(el.options).map(o => o.value);
      const normalizedValue = String(value || '').toLowerCase();
      const match = options.find(o => o === value)
        || options.find(o => normalizedValue.includes(o.toLowerCase()) || o.toLowerCase().includes(normalizedValue));
      if (!match) return;
      el.value = match;
    } else {
      el.value = value;
    }
    el.style.borderColor = skill.color;
    el.title = `Préchargé depuis ${handoff.sourceModule}`;
    applied += 1;
  });

  if (!applied) return false;
  const sourceLabel = `${handoff.sourceModule} — ${handoff.sourceName}`;
  showToast(`✅ Données utiles préchargées depuis ${sourceLabel}`, 'success');
  return true;
}

// M3-specific: smarter extraction per source
function extractForM3(sourceId) {
  const text = resultCache[sourceId] || '';
  if (!text) return { competence: '', phase: null };

  const m1Competence = sourceId === 'm1' ? extractM1CompetenceForM3(text) : '';

  // Try to extract the first observable objective line, excluding EVFC phase goals.
  const objMatch = !m1Competence && (
    text.match(/comp[ée]tence[^:\n]*:\s*([^\n]{10,})/i)
    || text.match(/objectif(?!\s+de\s+la\s+phase)[^:\n]*:\s*([^\n]{10,})/i)
    || text.match(/(?:être|etre|sera)\s+capable[^\n]{5,}/i)
    || text.match(/savoir[- ]faire[^:\n]*:\s*([^\n]{10,})/i)
  );

  let competence = m1Competence || (objMatch
    ? cleanCompetenceCandidate(objMatch[1] || objMatch[0]).slice(0, 300)
    : extractCompetenceFromCache(sourceId, 300));

  // Try to detect phase hint from M1 (Écouter / Voir sections)
  let phase = null;
  if (sourceId === 'm1') {
    const hasEcouter = /écouter|ecouter/i.test(text);
    const hasVoir    = /\bvoir\b/i.test(text);
    if (hasEcouter && hasVoir) phase = 'Écouter + Voir';
    else if (hasEcouter)       phase = 'Écouter';
    else if (hasVoir)          phase = 'Voir';
  }

  // Domain extraction from M2
  let domaine = null;
  if (sourceId === 'm2') {
    const domMatch = text.match(/domaine[^:\n]*:\s*([^\n]{3,60})/i)
      || text.match(/spécialité[^:\n]*:\s*([^\n]{3,60})/i);
    domaine = domMatch ? (domMatch[1] || '').replace(/\*\*/g, '').trim() : null;
  }

  return { competence, phase, domaine };
}

// Called by M3 "Utiliser [MX]" buttons
function prefillM3From(sourceId) {
  const { competence, phase, domaine } = extractForM3(sourceId);
  const sourceLabel = { m0: 'M0', m1: 'M1', m2: 'M2' }[sourceId] || sourceId;
  const sourceColor = { m0: '#0891b2', m1: '#0284c7', m2: '#7c3aed' }[sourceId] || '#002455';

  // Fill competence field
  const compField = document.getElementById('field_competence');
  if (compField && competence) {
    compField.value = competence;
    compField.style.borderColor = sourceColor;
    compField.title = `Pré-rempli depuis ${sourceLabel}`;
  }

  // Fill phase select if detected
  if (phase) {
    const phaseField = document.getElementById('field_phase');
    if (phaseField) {
      const opts = Array.from(phaseField.options).map(o => o.value);
      const match = opts.find(o => o.toLowerCase().includes(phase.toLowerCase().slice(0, 6)));
      if (match) { phaseField.value = match; phaseField.style.borderColor = sourceColor; }
    }
  }

  // Fill domaine hint into competence if M2 and no competence found
  if (domaine && compField && !compField.value) {
    compField.value = domaine;
    compField.style.borderColor = sourceColor;
  }

  showToast(`✅ Champs pré-remplis depuis ${sourceLabel}`, 'success');
}

// ─────────────────────────────────────────────
// PROMPT + TOKEN SETTINGS
// ─────────────────────────────────────────────
function getMaxTokensForSkill(skillId) {
  const stored = maxTokensByModule[skillId];
  if (stored === NO_MAX_TOKENS) return NO_MAX_TOKENS;
  const fallback = NEUTRAL_MAX_TOKENS;
  if (stored === undefined || stored === null || stored === '') return fallback;
  return Number(stored) || fallback;
}

function resolveMaxTokensForApi(skillId) {
  const value = getMaxTokensForSkill(skillId);
  if (value === NO_MAX_TOKENS) {
    return MODEL_MAX_OUTPUT_TOKENS[selectedModel] || 64000;
  }
  return value;
}

function setMaxTokensForCurrentSkill(value) {
  if (!currentSkill) return;
  if (value === NO_MAX_TOKENS) {
    maxTokensByModule[currentSkill.id] = NO_MAX_TOKENS;
    const modelMax = MODEL_MAX_OUTPUT_TOKENS[selectedModel] || 64000;
    showToast(`⚠️ "Pas de limite" : la génération peut aller jusqu'à ${modelMax.toLocaleString('fr-FR')} tokens (max du modèle ${MODEL_LABELS[selectedModel] || selectedModel}) — temps de génération et coût plus élevés.`, 'error');
  } else {
    const parsed = Number(value);
    if (!TOKEN_PRESETS.includes(parsed)) return;
    maxTokensByModule[currentSkill.id] = parsed;
  }
  updateDevRecoButtonState();
}

function getTemperatureForSkill(skillId) {
  const stored = Number(temperatureByModule[skillId]);
  if (TEMPERATURE_PRESETS.some(p => p.value === stored)) return stored;
  return NEUTRAL_TEMPERATURE;
}

function setTemperatureForCurrentSkill(value) {
  if (!currentSkill) return;
  const parsed = Number(value);
  if (!TEMPERATURE_PRESETS.some(p => p.value === parsed)) return;
  temperatureByModule[currentSkill.id] = parsed;
  updateDevRecoButtonState();
}

function getDevRecommendedSettings(skillId) {
  return {
    maxTokens: DEV_RECOMMENDED_MAX_TOKENS_BY_MODULE[skillId] ?? NEUTRAL_MAX_TOKENS,
    temperature: DEV_RECOMMENDED_TEMPERATURE_BY_MODULE[skillId] ?? NEUTRAL_TEMPERATURE,
  };
}

function applyDevRecommendedSettings() {
  if (!currentSkill) return;
  const reco = getDevRecommendedSettings(currentSkill.id);
  maxTokensByModule[currentSkill.id] = reco.maxTokens;
  temperatureByModule[currentSkill.id] = reco.temperature;

  const maxTokensField = document.getElementById('field_max_tokens');
  const temperatureField = document.getElementById('field_temperature');
  if (maxTokensField) maxTokensField.value = String(reco.maxTokens);
  if (temperatureField) temperatureField.value = String(reco.temperature);

  const temperatureLabel = TEMPERATURE_PRESETS.find(p => p.value === reco.temperature)?.label || reco.temperature;
  updateDevRecoButtonState();
  showToast(`✅ Valeurs recommandées appliquées : ${reco.maxTokens.toLocaleString('fr-FR')} tokens · ${temperatureLabel}`, 'success');
}

function updateDevRecoButtonState() {
  if (!currentSkill) return;
  const btn = document.getElementById('btn-dev-reco');
  if (!btn) return;
  const reco = getDevRecommendedSettings(currentSkill.id);
  const selected = getMaxTokensForSkill(currentSkill.id) === reco.maxTokens
    && getTemperatureForSkill(currentSkill.id) === reco.temperature;
  btn.classList.toggle('selected', selected);
  btn.textContent = selected ? '✅ Valeurs recommandées' : '💡 Valeurs recommandées';
}

function collectSkillInputs(skill, markInvalid = true) {
  const inputs = {};
  let valid = true;
  skill.fields.forEach(f => {
    const el = document.getElementById(`field_${f.id}`);
    if (!el) return;
    inputs[f.id] = el.value.trim();
    if (f.required && !inputs[f.id]) {
      if (markInvalid) el.style.borderColor = 'var(--red)';
      valid = false;
    } else if (markInvalid) {
      el.style.borderColor = '';
    }
  });
  return { inputs, valid };
}

function buildUserPrompt(skill, inputs) {
  return skill.fields.map(f => {
    const val = inputs[f.id];
    if (!val) return null;
    return `**${f.label}** : ${val}`;
  }).filter(Boolean).join('\n');
}

function getSkillContextForModule(skillId) {
  return EVFC_MODULE_SKILLS[skillId] || null;
}

function buildEvfcChainInstruction(skill) {
  if (!skill || !Array.isArray(skill.chain) || skill.chain.length === 0) return [];

  const nextModules = skill.chain
    .map(id => SKILLS.find(s => s.id === id))
    .filter(Boolean)
    .map(s => `- ${s.module} — ${s.name} : proposer à l'utilisateur de passer à ce module si ce livrable correspond à son besoin suivant.`);

  if (nextModules.length === 0) return [];

  return [
    '',
    '---',
    'CONTRAINTE FINALE — ENCHAÎNEMENT EVFC :',
    'Ajoute toujours en fin de livrable une rubrique exactement intitulée "📌 Enchaînement EVFC".',
    'Dans cette rubrique, propose le ou les modules suivants de l\'application selon le chaînage logique EVFC :',
    ...nextModules,
    'Ne mentionne jamais les noms techniques de skills dans cette rubrique, par exemple pas de nom comme evfc-faire-scenario-generator, qcm-evfc-validator ou grilles-criteriees.',
    'Pour toute proposition de passage au module suivant dans le livrable final, utilise uniquement les intitulés utilisateur des modules, jamais les noms techniques de skills.',
    'Formule l’appel à l’action côté utilisateur, par exemple : "Module M4 — Scénarios FAIRE : continuer avec ce module pour transformer la séquence en mise en situation pratique."'
  ];
}

function buildSystemPrompt(skill) {
  const skillContext = getSkillContextForModule(skill.id);
  if (!skillContext) return skill.systemPrompt;
  const finalTechnicalRules = skill.id === 'm3' ? [
    '',
    '---',
    'CONTRAINTE TECHNIQUE FINALE M3 :',
    'Pour buildFormFromSheet(), la feuille Google Sheets source doit toujours être nommée exactement "QCM".',
    'Le script doit utiliser SpreadsheetApp.getActiveSpreadsheet().getSheetByName(\'QCM\') et arrêter clairement l\'exécution avec un message explicite si cette feuille est absente.',
    'Ne jamais utiliser getActiveSheet(), ni un nom de feuille dérivé du titre, ni un autre nom comme "Questions" ou "Quiz".'
  ] : [];
  const finalChainRules = buildEvfcChainInstruction(skill);
  return [
    skill.systemPrompt.trim(),
    '',
    '---',
    `SKILL EVFC À APPLIQUER : ${skillContext.name}`,
    `Titre : ${skillContext.title}`,
    `Dossier source : skills/${skillContext.folder}/SKILL.md`,
    '',
    'Instructions : applique strictement le skill ci-dessous pour cadrer la génération, le format du livrable, les contraintes pédagogiques, les interdictions et les vérifications finales.',
    '',
    skillContext.content.trim(),
    ...finalTechnicalRules,
    ...finalChainRules
  ].join('\n');
}

function buildPromptPreview(skill, inputs) {
  return [
    `# ${skill.module} - ${skill.name}`,
    '',
    '## Modèle',
    selectedModel,
    '',
    '## Longueur maximale',
    getMaxTokensForSkill(skill.id) === NO_MAX_TOKENS
      ? `Pas de limite (${resolveMaxTokensForApi(skill.id)} tokens — max du modèle ${selectedModel})`
      : `${getMaxTokensForSkill(skill.id)} tokens`,
    '',
    '## Créativité',
    `temperature ${getTemperatureForSkill(skill.id)}`,
    '',
    '## System prompt',
    buildSystemPrompt(skill),
    '',
    '## Message utilisateur',
    buildUserPrompt(skill, inputs)
  ].join('\n');
}

function copyPromptBeforeGeneration() {
  if (!currentSkill) return;
  const { inputs, valid } = collectSkillInputs(currentSkill, true);
  if (!valid) {
    showToast('⚠️ Remplis les champs obligatoires avant de copier le prompt', 'error');
    return;
  }

async function generate() {
  const skill = currentSkill;
  const btn = document.getElementById('btn-gen');

  const { inputs, valid } = collectSkillInputs(skill, true);

  if (!valid) {
    showToast('⚠️ Remplis les champs obligatoires', 'error');
    return;
  }

  const userPrompt = buildUserPrompt(skill, inputs);
  const systemPrompt = buildSystemPrompt(skill);
  const maxTokens = resolveMaxTokensForApi(skill.id);
  const temperature = getTemperatureForSkill(skill.id);

  btn.classList.add('loading');
  btn.disabled = true;

  // ── Vérifier la clé API ──
  let apiKey = getApiKey();
  if (!apiKey) {
    btn.classList.remove('loading');
    btn.disabled = false;
    showApiKeyModal(() => generate()); // re-déclenche generate après saisie
    return;
  }

  const resultZone = document.getElementById('result-zone');
  resultZone.innerHTML = `
    <div class="result-zone" style="padding:40px; text-align:center; color:var(--text-muted)">
      <div style="font-size:32px; animation:spin 1s linear infinite; display:inline-block">⚙️</div>
      <p style="margin-top:12px; font-size:14px;">Génération en cours…</p>
    </div>
  `;

  try {
    const response = await fetch(API_CONFIG.endpoint, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': API_CONFIG.anthropicVersion,
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: selectedModel,
        max_tokens: maxTokens,
        temperature,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    const data = await response.json();

    if (data.error) {
      if (data.error.type === 'authentication_error' || response.status === 401) {
        saveApiKey(''); // clear invalid key
        btn.classList.remove('loading');
        btn.disabled = false;
        showApiKeyModal(() => generate());
        showToast('🔑 Clé API invalide — saisis-en une nouvelle', 'error');
        return;
      }
      throw new Error(data.error.message);
    }

    const text = data.content?.find(b => b.type === 'text')?.text || '';
    currentResult = text;
    resultCache[skill.id] = text;
    resultModelByModule[skill.id] = buildResultMeta(selectedModel, data.usage);
    safeSetLocalStorage(
      STORAGE_KEYS.resultModelByModule,
      JSON.stringify(resultModelByModule)
    );
    safeSetLocalStorage(
      STORAGE_KEYS.resultCache,
      JSON.stringify(resultCache),
      'Cache local plein ou indisponible : le livrable reste visible, mais ne sera pas restauré au prochain lancement.'
    );

    const preparedHandoffs = storeHandoffsForResult(skill, text, inputs);
    renderResult(text, skill);
    showToast('✅ Livrable généré !', 'success');
    if (preparedHandoffs.length) {
      const labels = preparedHandoffs
        .map(id => SKILLS.find(s => s.id === id)?.module)
        .filter(Boolean)
        .join(', ');
      showToast(`🔁 Préchargement disponible pour ${labels}`, 'success');
    }
  } catch (err) {
    resultZone.innerHTML = `
      <div class="result-zone" style="padding:30px; text-align:center">
        <p style="color:var(--red); font-size:14px">❌ Erreur : ${err.message}</p>
      </div>
    `;
    showToast('❌ Erreur de génération', 'error');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function extractEvfcChainModuleIds(text) {
  const raw = String(text || '');
  const headingMatch = raw.match(/(?:^|\n)#{1,6}\s*📌?\s*Encha[îi]nement EVFC\s*\n([\s\S]*?)(?=\n#{1,6}\s+|\n---|\s*$)/i)
    || raw.match(/(?:^|\n)📌?\s*Encha[îi]nement EVFC\s*\n([\s\S]*?)(?=\n#{1,6}\s+|\n---|\s*$)/i);
  if (!headingMatch) return [];

  const section = headingMatch[1] || '';
  const ids = [];
  const moduleRegex = /\bM([0-7])\b/g;
  let match;
  while ((match = moduleRegex.exec(section)) !== null) {
    const id = `m${match[1]}`;
    if (SKILLS.some(s => s.id === id) && !ids.includes(id)) ids.push(id);
  }
  return ids;
}

function resolveNextSkillsForResult(text, skill) {
  const idsFromLivrable = extractEvfcChainModuleIds(text);
  const ids = idsFromLivrable.length ? idsFromLivrable : (skill.chain || []);
  return ids
    .map(id => SKILLS.find(s => s.id === id))
    .filter(Boolean);
}

function getM3CopyAlertType(code) {

  if (/Num[ée]ro\s*,\s*Question\s*,\s*TypeQuestion/i.test(clean)) return 'csv';
  return null;

function insertM3CopyAlert(pre, code) {
  const type = getM3CopyAlertType(code);

  alert.className = 'm3-copy-alert';
  alert.innerHTML = type === 'csv'
    ? `<span>⚠️</span><div><strong>Avant de copier le CSV :</strong> crée un Google Sheets avec un onglet nommé exactement <code>QCM</code>, puis colle le CSV dans cet onglet. Le script attend ce nom précis.</div>`

}

async function ensureDocxLib() {

async function downloadCombinedDocx(entries) {
  const {
    Document, Packer, Paragraph, TextRun, BorderStyle,
    Table, TableRow, TableCell, WidthType,
    ShadingType, Header, Footer, PageNumber, TabStopType, TabStopPosition
  } = window.docx;

  const NAVY = '002455';
  const RED = 'F0322C';
  const BLIGHT = 'E8F0FA';
  const ALERT = 'FFE8E6';
  const BORDER = 'D8DEE6';
  const TEXT = '2B2B2B';
  const GRAY = '6B7280';
  const WHITE = 'FFFFFF';

  const cleanDocx = (s) => s
    ? s.replace(/[\u{1F000}-\u{1FFFF}]/gu, '').replace(/[\u{2600}-\u{27BF}]/gu, '')
        .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g, '').replace(/—/g, '-').replace(/–/g, '-')
    : '';

  const inlineRuns = (rawLine, opts = {}) => {
    const parts = [];
    const segments = cleanDocx(rawLine)
      .replace(/\*\*(.*?)\*\*/g, '\x00BOLD\x00$1\x00ENDBOLD\x00')
      .replace(/`(.*?)`/g, '$1')
      .split('\x00');
    let bold = false;
    segments.forEach(seg => {
      if (seg === 'BOLD') { bold = true; return; }
      if (seg === 'ENDBOLD') { bold = false; return; }
      if (seg) parts.push(new TextRun({ text: seg, bold, font: 'Calibri', ...opts }));
    });
    return parts.length ? parts : [new TextRun({ text: cleanDocx(rawLine), font: 'Calibri', ...opts })];
  };

  const isSeparatorRow = (line) => /^\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?$/.test(line.trim());
  const children = [];

  children.push(new Paragraph({
    children: [new TextRun({ text: 'Pack FPA - Export combine multi-modules', bold: true, size: 44, color: NAVY, font: 'Calibri' })],
    spacing: { before: 120, after: 120 },
    border: { bottom: { style: BorderStyle.THICK, size: 8, color: RED, space: 4 } }
  }));
  children.push(new Paragraph({
    children: [
      new TextRun({ text: 'Edumediapole - Formateur Augmente EVFC', size: 18, color: GRAY, italics: true, font: 'Calibri' }),
      new TextRun({ text: '     ', size: 18 }),
      new TextRun({ text: `Genere le ${new Date().toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' })}`, size: 18, color: GRAY, italics: true, font: 'Calibri' })
    ],
    spacing: { before: 80, after: 360 }
  }));
  children.push(new Paragraph({
    children: [new TextRun({ text: 'Modules inclus', bold: true, size: 24, color: NAVY, font: 'Calibri' })],
    spacing: { before: 120, after: 120 }
  }));
  entries.forEach(({ skill }) => {
    children.push(new Paragraph({
      children: [
        new TextRun({ text: `${cleanDocx(skill.module)} `, bold: true, size: 21, color: RED, font: 'Calibri' }),
        new TextRun({ text: cleanDocx(skill.name), size: 21, color: TEXT, font: 'Calibri' })
      ],
      spacing: { before: 50, after: 50 }
    }));
  });

  entries.forEach(({ skill, text }, entryIndex) => {
    children.push(new Paragraph({
      pageBreakBefore: entryIndex > 0,
      children: [new TextRun({ text: `  ${cleanDocx(skill.module)}  `, bold: true, size: 18, color: WHITE, font: 'Calibri' })],
      shading: { type: ShadingType.CLEAR, fill: RED, color: 'auto' },
      spacing: { before: 320, after: 100 }
    }));
    children.push(new Paragraph({
      children: [new TextRun({ text: cleanDocx(skill.name), bold: true, size: 42, color: NAVY, font: 'Calibri' })],
      spacing: { before: 120, after: 240 },
      border: { bottom: { style: BorderStyle.THICK, size: 8, color: RED, space: 4 } }
    }));

    const lines = text.split('\n');
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];

      if (line.startsWith('# ')) {
        children.push(new Paragraph({
          children: [new TextRun({ text: `  ${cleanDocx(line.replace(/^# /, ''))}`, bold: true, size: 28, color: WHITE, font: 'Calibri' })],
          shading: { type: ShadingType.CLEAR, fill: NAVY, color: 'auto' },
          spacing: { before: 400, after: 160 }
        }));
      } else if (line.startsWith('## ')) {
        children.push(new Paragraph({
          children: inlineRuns(line.replace(/^## /, ''), { size: 26, color: NAVY }),
          spacing: { before: 320, after: 100 },
          border: { bottom: { style: BorderStyle.SINGLE, size: 4, color: RED, space: 3 } }
        }));
      } else if (line.startsWith('### ')) {
        children.push(new Paragraph({
          children: inlineRuns(line.replace(/^### /, ''), { size: 22, color: NAVY, bold: true }),
          spacing: { before: 220, after: 80 }
        }));
      } else if (line.startsWith('- ') || line.startsWith('* ')) {
        children.push(new Paragraph({
          children: [new TextRun({ text: '•  ', size: 21, color: RED, font: 'Calibri' }), ...inlineRuns(line.replace(/^[*-] /, ''), { size: 21, color: TEXT })],
          spacing: { before: 60, after: 60 },
          indent: { left: 360 }
        }));
      } else if (line.startsWith('> ')) {
        children.push(new Paragraph({
          children: inlineRuns(line.replace(/^> /, ''), { size: 20, color: '5C2020', italics: true }),
          shading: { type: ShadingType.CLEAR, fill: ALERT, color: 'auto' },
          spacing: { before: 120, after: 120 },
          indent: { left: 480, right: 240 },
          border: { left: { style: BorderStyle.THICK, size: 10, color: RED, space: 8 } }
        }));
      } else if (line.trim() === '' || line.startsWith('---') || line.startsWith('```')) {
        children.push(new Paragraph({ text: '', spacing: { after: 80 } }));
      } else if (line.trim().startsWith('|')) {
        const tableLines = [];
        while (i < lines.length && lines[i].trim().startsWith('|')) { tableLines.push(lines[i]); i++; }
        i--;
        const dataRows = tableLines
          .filter(l => !isSeparatorRow(l))
          .map(l => l.split('|').map(c => c.trim()).filter(Boolean))
          .filter(row => row.length);
        if (!dataRows.length) continue;
        const cols = Math.max(...dataRows.map(r => r.length));
        const colPct = Math.floor(100 / cols);
        const cellBorders = {
          top: { style: BorderStyle.SINGLE, size: 2, color: BORDER },
          bottom: { style: BorderStyle.SINGLE, size: 2, color: BORDER },
          left: { style: BorderStyle.SINGLE, size: 2, color: BORDER },
          right: { style: BorderStyle.SINGLE, size: 2, color: BORDER }
        };
        children.push(new Table({
          width: { size: 100, type: WidthType.PERCENTAGE },
          rows: dataRows.map((row, ri) => new TableRow({
            tableHeader: ri === 0,
            children: Array.from({ length: cols }, (_, ci) => {
              const isHeader = ri === 0;
              const fill = isHeader ? NAVY : (ri % 2 === 0 ? BLIGHT : WHITE);
              return new TableCell({
                width: { size: colPct, type: WidthType.PERCENTAGE },
                shading: { type: ShadingType.CLEAR, fill, color: 'auto' },
                borders: cellBorders,
                children: [new Paragraph({
                  children: inlineRuns(row[ci] || '', { size: 19, color: isHeader ? WHITE : TEXT, bold: isHeader }),
                  spacing: { before: 60, after: 60 },
                  indent: { left: 80, right: 80 }
                })]
              });
            })
          }))
        }));
        children.push(new Paragraph({ text: '', spacing: { after: 160 } }));
      } else if (line.trim()) {
        children.push(new Paragraph({ children: inlineRuns(line, { size: 21, color: TEXT }), spacing: { before: 60, after: 60 } }));
      }
    }
  });

  const docHeader = new Header({
    children: [new Paragraph({
      children: [
        new TextRun({ text: 'Edumediapole', bold: true, size: 16, color: NAVY, font: 'Calibri' }),
        new TextRun({ text: '  -  Export combine EVFC', size: 16, color: GRAY, font: 'Calibri' })
      ],
      border: { bottom: { style: BorderStyle.SINGLE, size: 4, color: NAVY, space: 4 } },
      spacing: { after: 120 }
    })]
  });

  const docFooter = new Footer({
    children: [new Paragraph({
      children: [
        new TextRun({ text: 'B.FERNON © Edumediapole', size: 16, color: GRAY, font: 'Calibri' }),
        new TextRun({ text: '\t', size: 16 }),
        new TextRun({ children: [PageNumber.CURRENT], size: 16, color: GRAY, font: 'Calibri' }),
        new TextRun({ text: ' / ', size: 16, color: GRAY, font: 'Calibri' }),
        new TextRun({ children: [PageNumber.TOTAL_PAGES], size: 16, color: GRAY, font: 'Calibri' }),
        new TextRun({ text: '\t', size: 16 }),
        new TextRun({ text: new Date().toLocaleDateString('fr-FR'), size: 16, color: GRAY, font: 'Calibri' })
      ],
      tabStops: [
        { type: TabStopType.CENTER, position: TabStopPosition.MAX / 2 },
        { type: TabStopType.RIGHT, position: TabStopPosition.MAX }
      ],
      border: { top: { style: BorderStyle.SINGLE, size: 4, color: NAVY, space: 4 } },
      spacing: { before: 120 }
    })]
  });

  const doc = new Document({
    creator: 'Edumediapole - Formateur Augmente EVFC',
    title: 'Export combine multi-modules EVFC',
    description: 'Genere par le Pack FPA Edumediapole',
    sections: [{
      properties: { page: { margin: { top: 1134, right: 1134, bottom: 1134, left: 1134 } } },
      headers: { default: docHeader },
      footers: { default: docFooter },
      children
    }]
  });

  const blob = await Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const suffix = entries.map(({ skill }) => skill.module).join('_');
  a.href = url;
  a.download = `EVFC_COMBINE_${suffix}_${new Date().toISOString().slice(0,10)}.docx`;
  a.click();
  URL.revokeObjectURL(url);
}

// Remplace "EVFC" dans une chaîne HTML par les lettres colorées
// onDark = true si le texte est sur fond sombre (header, badge)
function styleEVFC(str, onDark = false) {
  const cls = onDark ? ' on-dark' : '';
  return str.replace(/EVFC/g,
    `<span class="evfc-e${cls}">E</span><span class="evfc-v${cls}">V</span><span class="evfc-f${cls}">F</span><span class="evfc-c${cls}">C</span>`
  );
}

// Post-traitement du result-body M2 : colore "Claude" / "CLAUDE" en gras orange
// Parcourt les nœuds texte pour ne pas casser les balises HTML
function highlightClaudeInM2(rootEl) {
  const walker = document.createTreeWalker(rootEl, NodeFilter.SHOW_TEXT, null, false);
  const nodes = [];
  let node;
  while ((node = walker.nextNode())) nodes.push(node);
  nodes.forEach(n => {
    if (!n.nodeValue.match(/Claude|CLAUDE/)) return;
    const span = document.createElement('span');
    span.innerHTML = n.nodeValue.replace(/(Claude|CLAUDE)/g, '<span class="claude-highlight">$1</span>');
    n.parentNode.replaceChild(span, n);
  });
}

// Nettoie les caractères non supportés par jsPDF (Helvetica = Latin-1 uniquement)
// Remplace les émojis courants par des équivalents lisibles avant de supprimer le reste
function cleanForPDF(str) {
  if (!str) return '';
  return str
    // --- Étoiles (niveaux, notes) ---
    .replace(/⭐⭐⭐⭐⭐|🌟🌟🌟🌟🌟/g, '*****')
    .replace(/⭐⭐⭐⭐|🌟🌟🌟🌟/g, '****')
    .replace(/⭐⭐⭐|🌟🌟🌟/g, '***')
    .replace(/⭐⭐|🌟🌟/g, '**')
    .replace(/⭐|🌟/g, '*')
    // --- Validation / statut ---
    .replace(/✅/g, '[OK]')
    .replace(/❌/g, '[X]')
    .replace(/⚠️|⚠/g, '[!]')
    .replace(/🔴/g, '(non)')
    .replace(/🟡/g, '(partiel)')
    .replace(/🟢/g, '(oui)')
    .replace(/✓|☑/g, 'OK')
    .replace(/✗|☒/g, 'X')
    // --- Indicateurs courants EVFC ---
    .replace(/🎯/g, '>')
    .replace(/💡/g, '(i)')
    .replace(/📋/g, '')
    .replace(/📝/g, '')
    .replace(/📄/g, '')
    .replace(/🔑/g, '[cle]')
    .replace(/👉/g, '>')
    .replace(/👀/g, '[voir]')
    .replace(/🛑/g, '[stop]')
    .replace(/💬/g, '[?]')
    // --- Chiffres cerclés ---
    .replace(/①|1️⃣/g, '1').replace(/②|2️⃣/g, '2').replace(/③|3️⃣/g, '3')
    .replace(/④|4️⃣/g, '4').replace(/⑤|5️⃣/g, '5')
    // --- Tirets typographiques ---
    .replace(/—/g, '-').replace(/–/g, '-').replace(/‒/g, '-')
    // --- Flèches ---
    .replace(/→|▶|➡/g, '>').replace(/←|◀|⬅/g, '<')
    .replace(/↑|⬆/g, '^').replace(/↓|⬇/g, 'v')
    // --- Supprime les émojis restants (plages Unicode Emoji) ---
    .replace(/[\u{1F000}-\u{1FFFF}]/gu, '')
    .replace(/[\u{2600}-\u{27BF}]/gu, '')
    .replace(/[\u{2B00}-\u{2BFF}]/gu, '')
    .replace(/[\u{FE00}-\u{FE0F}]/gu, '')
    // --- Remplace tout ce qui reste hors Latin-1 par '?' ---
    .replace(/[^\x00-\xFF]/g, '?')
    .trim();
}

async function exportPDF() {
  if (!currentResult) return showToast('⚠️ Génère d\'abord un livrable', 'error');

  showToast('⏳ Export PDF en cours…');

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 15;
  const contentW = pageW - margin * 2;

  // Header
  doc.setFillColor(0, 36, 85);
  doc.rect(0, 0, pageW, 18, 'F');
  doc.setFontSize(12);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(255, 255, 255);
  doc.text(cleanForPDF('Edumédiapole · Formateur Augmenté EVFC'), margin, 12);
  doc.setFontSize(9);
  doc.setFont('helvetica', 'normal');
  doc.text(cleanForPDF(`${currentSkill.module} — ${currentSkill.name}`), pageW - margin, 12, { align: 'right' });

  // Red accent line
  doc.setFillColor(240, 50, 44);
  doc.rect(0, 18, pageW, 1.5, 'F');

  // Date
  doc.setFontSize(8);
  doc.setTextColor(100, 100, 120);
  doc.text(cleanForPDF(`Généré le ${new Date().toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' })}`), margin, 26);

  let y = 32;

  // Process markdown lines
  const lines = currentResult.split('\n');
  doc.setTextColor(30, 30, 50);

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    if (y > pageH - 20) {
      doc.addPage();
      doc.setFillColor(0, 36, 85);
      doc.rect(0, 0, pageW, 10, 'F');
      y = 16;
    }

    if (line.startsWith('# ')) {
      doc.setFillColor(0, 36, 85);
      doc.rect(margin - 2, y - 5, contentW + 4, 10, 'F');
      doc.setFontSize(14);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(255, 255, 255);
      doc.text(cleanForPDF(line.replace(/^# /, '')).substring(0, 70), margin, y);
      doc.setTextColor(30, 30, 50);
      y += 10;
    } else if (line.startsWith('## ')) {
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(0, 36, 85);
      doc.text(cleanForPDF(line.replace(/^## /, '')).substring(0, 80), margin, y);
      doc.setDrawColor(0, 36, 85);
      doc.setLineWidth(0.3);
      doc.line(margin, y + 1.5, margin + contentW, y + 1.5);
      doc.setTextColor(30, 30, 50);
      y += 8;
    } else if (line.startsWith('### ')) {
      doc.setFontSize(11);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(240, 50, 44);
      doc.text(cleanForPDF(line.replace(/^### /, '')).substring(0, 90), margin, y);
      doc.setTextColor(30, 30, 50);
      y += 7;
    } else if (line.startsWith('- ') || line.startsWith('* ')) {
      doc.setFontSize(9.5);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(40, 40, 60);
      const clean = cleanForPDF(line.replace(/^[*-] /, '').replace(/\*\*(.*?)\*\*/g, '$1'));
      const wrapped = doc.splitTextToSize(`• ${clean}`, contentW - 8);
      doc.text(wrapped, margin + 4, y);
      y += wrapped.length * 5.5;
    } else if (line.startsWith('> ')) {
      doc.setFillColor(250, 240, 240);
      doc.rect(margin, y - 4, contentW, 8, 'F');
      doc.setDrawColor(240, 50, 44);
      doc.setLineWidth(0.8);
      doc.line(margin, y - 4, margin, y + 4);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'italic');
      doc.setTextColor(100, 40, 40);
      const clean = cleanForPDF(line.replace(/^> /, ''));
      doc.text(clean.substring(0, 100), margin + 4, y);
      doc.setTextColor(30, 30, 50);
      y += 10;
    } else if (line.trim() === '' || line.startsWith('---')) {
      y += 3;
    } else if (line.trim().startsWith('|')) {
      // --- Tableau Markdown ---
      // Collecter toutes les lignes consécutives du tableau
      const tableLines = [];
      while (i < lines.length && lines[i].trim().startsWith('|')) {
        tableLines.push(lines[i]);
        i++;
      }
      i--; // le for loop fera i++ au prochain tour
      // Filtrer les séparateurs (--|--|--)
      const dataRows = tableLines
        .filter(l => !l.replace(/[\|\s\-:]/g, '').match(/^[-:]+$/) && l.replace(/[\|\s\-:]/g, '') !== '')
        .map(l => l.split('|').map(c => c.trim()).filter(Boolean));
      if (dataRows.length === 0) continue;
      const cols = Math.max(...dataRows.map(r => r.length));
      const colW = contentW / cols;
      const cellPad = 2;
      // Calcul hauteur dynamique par ligne
      const rowHeights = dataRows.map((row, ri) => {
        let maxH = 6;
        row.forEach(cell => {
          const clean = cleanForPDF(cell.replace(/\*\*(.*?)\*\*/g, '$1'));
          const wrapped = doc.splitTextToSize(clean, colW - cellPad * 2);
          const h = wrapped.length * 4.5 + 3;
          if (h > maxH) maxH = h;
        });
        return Math.max(maxH, ri === 0 ? 8 : 6);
      });
      const totalH = rowHeights.reduce((a, b) => a + b, 0);
      // Saut de page si nécessaire
      if (y + totalH > pageH - 20) {
        doc.addPage();
        doc.setFillColor(0, 36, 85);
        doc.rect(0, 0, pageW, 10, 'F');
        y = 16;
      }
      // Dessin
      dataRows.forEach((row, ri) => {
        const rh = rowHeights[ri];
        if (ri === 0) {
          doc.setFillColor(0, 36, 85);
        } else {
          ri % 2 === 0 ? doc.setFillColor(232, 238, 255) : doc.setFillColor(248, 250, 255);
        }
        doc.rect(margin, y, contentW, rh, 'F');
        doc.setDrawColor(180, 195, 220);
        doc.setLineWidth(0.2);
        doc.rect(margin, y, contentW, rh, 'S');
        row.forEach((cell, ci) => {
          const cx = margin + ci * colW;
          const clean = cleanForPDF(cell.replace(/\*\*(.*?)\*\*/g, '$1'));
          doc.setFontSize(ri === 0 ? 8.5 : 8);
          doc.setFont('helvetica', ri === 0 ? 'bold' : 'normal');
          doc.setTextColor(ri === 0 ? 255 : 30, ri === 0 ? 255 : 30, ri === 0 ? 255 : 50);
          const wrapped = doc.splitTextToSize(clean, colW - cellPad * 2);
          doc.text(wrapped, cx + cellPad, y + 4.5);
          if (ci < cols - 1) {
            doc.setDrawColor(180, 195, 220);
            doc.line(cx + colW, y, cx + colW, y + rh);
          }
        });
        y += rh;
      });
      y += 5;
    } else if (line.trim() && !line.startsWith('```')) {
      doc.setFontSize(9.5);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(40, 40, 60);
      const clean = cleanForPDF(line.replace(/\*\*(.*?)\*\*/g, '$1').replace(/`(.*?)`/g, '$1'));
      const wrapped = doc.splitTextToSize(clean, contentW);
      doc.text(wrapped, margin, y);
      y += wrapped.length * 5.5;
    }
  }

  // Footer on all pages
  const totalPages = doc.internal.getNumberOfPages();
  for (let p = 1; p <= totalPages; p++) {
    doc.setPage(p);
    doc.setFillColor(245, 247, 252);
    doc.rect(0, pageH - 10, pageW, 10, 'F');
    doc.setFontSize(7.5);
    doc.setTextColor(100, 100, 120);
    doc.setFont('helvetica', 'normal');
    doc.text(cleanForPDF('B.FERNON © Edumédiapole'), margin, pageH - 4);
    doc.text(`${p} / ${totalPages}`, pageW / 2, pageH - 4, { align: 'center' });
    doc.text(cleanForPDF(`${currentSkill.module} — ${currentSkill.name}`), pageW - margin, pageH - 4, { align: 'right' });
  }

  const filename = `EVFC_${currentSkill.module}_${currentSkill.name.replace(/\s+/g, '_')}_${new Date().toISOString().slice(0,10)}.pdf`;
  doc.save(filename);
  showToast('✅ PDF exporté !', 'success');
}

async function exportDOCX() {
  if (!currentResult) return showToast('⚠️ Génère d\'abord un livrable', 'error');

  showToast('⏳ Export DOCX en cours…');

  try {
    // Chargement dynamique de docx.js si pas encore disponible
    if (!window.docx) {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/docx@7.8.2/build/index.js';
        s.onload = resolve;
        s.onerror = () => reject(new Error('Impossible de charger docx.js (vérifiez votre connexion)'));
        document.head.appendChild(s);
      });
    }
    if (!window.docx) throw new Error('docx.js non disponible après chargement');
    const {
      Document, Packer, Paragraph, TextRun, BorderStyle,
      AlignmentType, Table, TableRow, TableCell, WidthType,
      ShadingType, Header, Footer, PageNumber, TabStopType, TabStopPosition
    } = window.docx;

    // ── Palette Édumédiapole ──────────────────────────────
    const NAVY   = '002455';
    const RED    = 'F0322C';
    const BLIGHT = 'E8F0FA';   // fond pédagogique bleu clair
    const ALERT  = 'FFE8E6';   // fond alerte douce
    const BORDER = 'D8DEE6';
    const TEXT   = '2B2B2B';
    const GRAY   = '6B7280';
    const WHITE  = 'FFFFFF';

    // Nettoyage DOCX : retire émojis + caractères de contrôle XML invalides
    const cleanDocx = (s) => s
      ? s.replace(/[\u{1F000}-\u{1FFFF}]/gu, '').replace(/[\u{2600}-\u{27BF}]/gu, '')
          .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g, '').replace(/—/g, '-').replace(/–/g, '-')
      : '';

    // Helper : parse inline bold (**...**) en TextRuns
    const inlineRuns = (rawLine, opts = {}) => {
      const parts = [];
      const segments = cleanDocx(rawLine)
        .replace(/\*\*(.*?)\*\*/g, '\x00BOLD\x00$1\x00ENDBOLD\x00')
        .split('\x00');
      let bold = false;
      segments.forEach(seg => {
        if (seg === 'BOLD') { bold = true; return; }
        if (seg === 'ENDBOLD') { bold = false; return; }
        if (seg) parts.push(new TextRun({ text: seg, bold, font: 'Calibri', ...opts }));
      });
      return parts.length ? parts : [new TextRun({ text: cleanDocx(rawLine), font: 'Calibri', ...opts })];
    };

    const children = [];

    // ── BLOC TITRE ────────────────────────────────────────
    // Pastille module (fond rouge)
    children.push(new Paragraph({
      children: [new TextRun({ text: `  ${currentSkill.module}  `, bold: true, size: 18, color: WHITE, font: 'Calibri' })],
      shading: { type: ShadingType.CLEAR, fill: RED, color: 'auto' },

    // Titre principal
    children.push(new Paragraph({
      children: [new TextRun({ text: cleanDocx(currentSkill.name), bold: true, size: 52, color: NAVY, font: 'Calibri' })],
      spacing: { before: 120, after: 120 },
      border: { bottom: { style: BorderStyle.THICK, size: 8, color: RED, space: 4 } }
    }));

    // Méta : organisation + date
    children.push(new Paragraph({
      children: [
        new TextRun({ text: 'Édumédiapole · Formateur Augmenté EVFC', size: 18, color: GRAY, italics: true, font: 'Calibri' }),
        new TextRun({ text: '     ', size: 18 }),
        new TextRun({ text: `Généré le ${new Date().toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric' })}`, size: 18, color: GRAY, italics: true, font: 'Calibri' })
      ],
      spacing: { before: 80, after: 560 }
    }));

    // ── CONTENU MARKDOWN ──────────────────────────────────
    const lines = currentResult.split('\n');

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];

      if (line.startsWith('# ')) {
        // H1 : bandeau navy plein
        children.push(new Paragraph({
          children: [new TextRun({ text: `  ${cleanDocx(line.replace(/^# /, ''))}`, bold: true, size: 28, color: WHITE, font: 'Calibri' })],
          shading: { type: ShadingType.CLEAR, fill: NAVY, color: 'auto' },
          spacing: { before: 400, after: 160 }
        }));

      } else if (line.startsWith('## ')) {
        // H2 : texte navy + filet rouge en bas
        children.push(new Paragraph({
          children: inlineRuns(line.replace(/^## /, ''), { size: 26, color: NAVY }),
          spacing: { before: 320, after: 100 },
          border: { bottom: { style: BorderStyle.SINGLE, size: 4, color: RED, space: 3 } }
        }));

      } else if (line.startsWith('### ')) {
        // H3 : texte navy gras
        children.push(new Paragraph({
          children: inlineRuns(line.replace(/^### /, ''), { size: 22, color: NAVY, bold: true }),
          spacing: { before: 220, after: 80 }
        }));

      } else if (line.startsWith('- ') || line.startsWith('* ')) {
        const runs = inlineRuns(line.replace(/^[*-] /, ''), { size: 21, color: TEXT });
        children.push(new Paragraph({
          children: [new TextRun({ text: '•  ', size: 21, color: RED, font: 'Calibri' }), ...runs],
          spacing: { before: 60, after: 60 },
          indent: { left: 360 }
        }));

      } else if (line.startsWith('> ')) {
        // Citation / encadré méthode : fond alerte + bordure rouge gauche
        children.push(new Paragraph({
          children: inlineRuns(line.replace(/^> /, ''), { size: 20, color: '5C2020', italics: true }),
          shading: { type: ShadingType.CLEAR, fill: ALERT, color: 'auto' },
          spacing: { before: 120, after: 120 },
          indent: { left: 480, right: 240 },
          border: { left: { style: BorderStyle.THICK, size: 10, color: RED, space: 8 } }
        }));

      } else if (line.trim() === '' || line.startsWith('---')) {
        children.push(new Paragraph({ text: '', spacing: { after: 80 } }));

      } else if (line.trim().startsWith('|')) {
        // ── Tableau Markdown ──
        const tableLines = [];
        while (i < lines.length && lines[i].trim().startsWith('|')) { tableLines.push(lines[i]); i++; }
        i--;
        const dataRows = tableLines
          .filter(l => !l.replace(/[\|\s\-:]/g, '').match(/^[-:]+$/) && l.replace(/[\|\s\-:]/g, '') !== '')
          .map(l => l.split('|').map(c => c.trim()).filter(Boolean));
        if (dataRows.length === 0) continue;
        const cols = Math.max(...dataRows.map(r => r.length));
        const colPct = Math.floor(100 / cols);
        const cellBorders = {
          top:    { style: BorderStyle.SINGLE, size: 2, color: BORDER },
          bottom: { style: BorderStyle.SINGLE, size: 2, color: BORDER },
          left:   { style: BorderStyle.SINGLE, size: 2, color: BORDER },
          right:  { style: BorderStyle.SINGLE, size: 2, color: BORDER }
        };
        const tblRows = dataRows.map((row, ri) => new TableRow({
          tableHeader: ri === 0,
          children: Array.from({ length: cols }, (_, ci) => {
            const cellRaw = cleanDocx((row[ci] || '').replace(/\*\*(.*?)\*\*/g, '\x00BOLD\x00$1\x00ENDBOLD\x00'));
            const isHeader = ri === 0;
            const fill = isHeader ? NAVY : (ri % 2 === 0 ? BLIGHT : WHITE);
            const runs = inlineRuns(row[ci] || '', { size: 19, color: isHeader ? WHITE : TEXT, bold: isHeader });
            return new TableCell({
              width: { size: colPct, type: WidthType.PERCENTAGE },
              shading: { type: ShadingType.CLEAR, fill, color: 'auto' },
              borders: cellBorders,
              children: [new Paragraph({ children: runs, spacing: { before: 60, after: 60 }, indent: { left: 80, right: 80 } })]
            });
          })
        }));
        children.push(new Table({ width: { size: 100, type: WidthType.PERCENTAGE }, rows: tblRows }));
        children.push(new Paragraph({ text: '', spacing: { after: 160 } }));

      } else if (line.trim() && !line.startsWith('```')) {
        const runs = inlineRuns(line.replace(/`(.*?)`/g, '$1'), { size: 21, color: TEXT });
        children.push(new Paragraph({ children: runs, spacing: { before: 60, after: 60 } }));
      }
    }

    // ── EN-TÊTE répété ────────────────────────────────────
    const docHeader = new Header({
      children: [new Paragraph({
        children: [
          new TextRun({ text: 'Édumédiapole', bold: true, size: 16, color: NAVY, font: 'Calibri' }),
          new TextRun({ text: `  ·  ${cleanDocx(currentSkill.module)} — ${cleanDocx(currentSkill.name)}`, size: 16, color: GRAY, font: 'Calibri' })
        ],
        border: { bottom: { style: BorderStyle.SINGLE, size: 4, color: NAVY, space: 4 } },
        spacing: { after: 120 }
      })]
    });

    // ── PIED DE PAGE ──────────────────────────────────────
    const docFooter = new Footer({
      children: [new Paragraph({
        children: [
          new TextRun({ text: 'B.FERNON © Edumédiapole', size: 16, color: GRAY, font: 'Calibri' }),
          new TextRun({ text: '\t', size: 16 }),
          new TextRun({ children: [PageNumber.CURRENT], size: 16, color: GRAY, font: 'Calibri' }),
          new TextRun({ text: ' / ', size: 16, color: GRAY, font: 'Calibri' }),
          new TextRun({ children: [PageNumber.TOTAL_PAGES], size: 16, color: GRAY, font: 'Calibri' }),
          new TextRun({ text: '\t', size: 16 }),
          new TextRun({ text: new Date().toLocaleDateString('fr-FR'), size: 16, color: GRAY, font: 'Calibri' })
        ],
        tabStops: [
          { type: TabStopType.CENTER, position: TabStopPosition.MAX / 2 },
          { type: TabStopType.RIGHT, position: TabStopPosition.MAX }
        ],
        border: { top: { style: BorderStyle.SINGLE, size: 4, color: NAVY, space: 4 } },
        spacing: { before: 120 }
      })]
    });

    const doc2 = new Document({
      creator: 'Édumédiapole · Formateur Augmenté EVFC',
      title: `${currentSkill.module} — ${currentSkill.name}`,
      description: 'Généré par le Pack FPA Édumédiapole',
      sections: [{
        properties: { page: { margin: { top: 1134, right: 1134, bottom: 1134, left: 1134 } } },
        headers: { default: docHeader },
        footers: { default: docFooter },
        children
      }]
    });

    const blob = await Packer.toBlob(doc2);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `EVFC_${currentSkill.module}_${currentSkill.name.replace(/\s+/g, '_')}_${new Date().toISOString().slice(0,10)}.docx`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ DOCX exporté !', 'success');
  } catch (err) {
    showToast(`❌ Erreur DOCX : ${err.message}`, 'error');
    console.error(err);
  }
}

// ─────────────────────────────────────────────
// M5 — PARSE GRILLE FROM MARKDOWN
// ─────────────────────────────────────────────
function normalizeGridText(value) {
  return String(value || '')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .toLowerCase();
}

function splitMarkdownTableLine(line) {
  return line
    .trim()
    .replace(/^\|/, '')
    .replace(/\|$/, '')
    .split('|')
    .map(cell => cell.trim());
}

function isMarkdownSeparatorLine(line) {
  return /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(line);
}

function extractMarkdownTables(mdText) {
  const lines = mdText.split('\n');
  const tables = [];

  for (let i = 0; i < lines.length; i++) {
    if (!lines[i].trim().startsWith('|')) continue;

    const start = i;
    const tableLines = [];
    while (i < lines.length && lines[i].trim().startsWith('|')) {
      tableLines.push(lines[i]);
      i++;
    }

    const headerLine = tableLines.find(line => !isMarkdownSeparatorLine(line));
    if (!headerLine) continue;

    const headers = splitMarkdownTableLine(headerLine);
    const dataLines = tableLines
      .slice(tableLines.indexOf(headerLine) + 1)
      .filter(line => !isMarkdownSeparatorLine(line));

    const rows = dataLines
      .map(line => splitMarkdownTableLine(line))
      .filter(cells => cells.length >= 2 && cells.some(Boolean))
      .map(cells => {
        const obj = {};
        headers.forEach((h, idx) => { obj[h] = cells[idx] || ''; });
        return obj;
      });

    const contextStart = Math.max(0, start - 10);
    const context = lines.slice(contextStart, start).join('\n');
    tables.push({ headers, rows, context, start });
  }

  return tables;
}

function scoreM5GridTable(table, type) {
  const haystack = normalizeGridText(`${table.context}\n${table.headers.join(' ')}`);
  const headerText = normalizeGridText(table.headers.join(' '));
  let score = 0;

  if (/(critere|criteres|dimension|capacite)/.test(headerText)) score += 80;
  if (/(indicateur|observable|observation|descripteur|preuve)/.test(headerText)) score += 50;
  if (/(niveau|acquis|maitrise|debutant|expert|insuffisant|0|1|2|3)/.test(headerText)) score += 30;
  if (table.rows.length >= 2) score += Math.min(table.rows.length, 8) * 4;

  if (/contexte d.?evaluation|modalite|duree|public|materiel|lieu|pre.?requis/.test(haystack)) score -= 140;

  if (type === 'formateur') {
    if (/grille d.?observation|observation formateur|grille formateur|evaluateur|formateur/.test(haystack)) score += 100;
    if (/auto.?evaluation|auto evaluation|apprenant/.test(haystack)) score -= 35;
  } else {
    if (/auto.?evaluation|auto evaluation|grille apprenant|apprenant/.test(haystack)) score += 100;
    if (/grille d.?observation|observation formateur|evaluateur/.test(haystack)) score -= 20;
  }

  return score;
}

function parseGrilleFromMarkdown(mdText, type = 'formateur') {
  // Extract title (first # heading)
  const titleMatch = mdText.match(/^#\s+(.+)/m);
  const title = titleMatch ? titleMatch[1].trim() : 'Grille d\'évaluation';

  // Extract table rows — format: | Critère | Indicateur | Niv1 | Niv2 | ... |
  const tables = extractMarkdownTables(mdText)
    .filter(table => table.rows.length > 0 && table.headers.length >= 2)
    .map(table => ({ ...table, score: scoreM5GridTable(table, type) }))
    .sort((a, b) => b.score - a.score);

  const selectedTable = tables[0] || null;
  const rows = selectedTable ? selectedTable.rows : [];
  const selectedContext = selectedTable ? normalizeGridText(`${selectedTable.context}\n${selectedTable.headers.join(' ')}`) : '';
  const sourceLabel = selectedTable
    ? (/auto.?evaluation|grille apprenant|apprenant/.test(selectedContext) ? 'Grille auto-évaluation apprenant' : 'Grille d\'observation formateur')
    : 'Grille détectée par défaut';

  // Fallback: extract criteria from bullet lists if no table found
  if (rows.length === 0) {
    const bullets = mdText.match(/^[-*]\s+\*\*(.+?)\*\*[:\s]*(.*)/gm) || [];
    bullets.forEach(b => {
      const m = b.match(/^[-*]\s+\*\*(.+?)\*\*[:\s]*(.*)/);
      if (m) rows.push({ critere: m[1].trim(), description: m[2].trim() });
    });
  }

  // Extract level columns (any header that's not "critere/critère/indicateur/description")
  const levelKeywords = /^(niv|level|acquis|non.acquis|maîtris|débutant|inter|expert|expert|insuffisant|en.cours|confirmé|0|1|2|3)/i;
  const headers0 = rows.length > 0 ? Object.keys(rows[0]) : [];
  const levels = headers0.filter(h => levelKeywords.test(h));

  return { title, rows, levels, headers: headers0, sourceLabel };
}

// ─────────────────────────────────────────────
function generateAppsScriptForms(mdText, type) {
  const { title, rows, levels, headers, sourceLabel } = parseGrilleFromMarkdown(mdText, type);
  const formTitle = type === 'formateur'
    ? `Grille d'observation formateur — ${title}`
    : `Grille d'auto-évaluation — ${title}`;

  const date = new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });

  // Build criteria items for the script
  const criteriaLines = rows.map((row, i) => {
    const critere = row[headers[0]] || row['critere'] || row['Critère'] || row['Critères'] || `Critère ${i+1}`;
    const indicateur = row[headers[1]] || row['indicateur'] || row['Indicateur'] || row['Description'] || '';

    // Determine choices
    let choices;
    if (levels.length >= 2) {
      choices = levels.map(l => row[l] || l).filter(Boolean);
    } else {
      // Default scales per type
      choices = type === 'formateur'
        ? ['Non acquis', 'En cours d\'acquisition', 'Acquis', 'Maîtrisé']
        : ['Jamais', 'Parfois', 'Souvent', 'Toujours'];
    }

    const choicesStr = choices.map(c => `'${c.replace(/'/g, "\\'")}'`).join(', ');
    const desc = indicateur ? ` — ${indicateur.slice(0, 120)}` : '';

    return `
  // Critère ${i+1}
  var item${i} = form.addMultipleChoiceItem();
  item${i}.setTitle('${critere.replace(/'/g, "\\'")}${desc.replace(/'/g, "\\'")}');
  item${i}.setChoiceValues([${choicesStr}]);
  item${i}.setRequired(true);`;
  }).join('\n');

  // Header section for formateur vs auto-eval
  const headerSection = type === 'formateur'
    ? `
  // En-tête formateur
  form.addTextItem().setTitle('Nom de l\\'apprenant').setRequired(true);
  form.addTextItem().setTitle('Prénom').setRequired(true);
  form.addDateItem().setTitle('Date d\\'observation').setRequired(true);
  form.addTextItem().setTitle('Contexte de l\\'observation (situation, lieu, durée)').setRequired(false);
  form.addSectionHeaderItem().setTitle('─── Critères d\\'évaluation ───');`
    : `
  // En-tête auto-évaluation
  form.addTextItem().setTitle('Ton prénom et nom').setRequired(true);
  form.addDateItem().setTitle('Date').setRequired(true);
  form.addSectionHeaderItem().setTitle('─── Auto-évaluation ───');
  form.addParagraphTextItem().setTitle('Ce que je pense avoir réussi').setRequired(false);
  form.addParagraphTextItem().setTitle('Ce que je dois encore travailler').setRequired(false);
  form.addSectionHeaderItem().setTitle('─── Critères ───');`;

  const footerSection = type === 'formateur'
    ? `
  // Commentaires formateur
  form.addSectionHeaderItem().setTitle('─── Synthèse formateur ───');
  form.addParagraphTextItem().setTitle('Points forts observés').setRequired(false);
  form.addParagraphTextItem().setTitle('Axes de progression').setRequired(false);
  form.addMultipleChoiceItem()
    .setTitle('Validation globale de la compétence')
    .setChoiceValues(['✅ Compétence validée', '🔄 À consolider', '❌ Non validée — remédiation nécessaire'])
    .setRequired(true);`
    : `
  // Synthèse auto-éval
  form.addSectionHeaderItem().setTitle('─── Bilan personnel ───');
  form.addScaleItem()
    .setTitle('Niveau de confiance global (1 = pas du tout confiant · 5 = très confiant)')
    .setBounds(1, 5)
    .setRequired(true);
  form.addParagraphTextItem().setTitle('Ce que je veux approfondir').setRequired(false);`;

  return `/**
 * ╔══════════════════════════════════════════════════════════╗
 * ║  ${formTitle.slice(0, 56).padEnd(56)} ║
 * ║  Généré par Formateur Augmenté EVFC — Édumédiapole      ║
 * ║  Date : ${date.padEnd(48)} ║
 * ║  Type : ${(type === 'formateur' ? 'Grille observation formateur' : 'Grille auto-évaluation apprenant').padEnd(48)} ║
 * ║  Source : ${sourceLabel.slice(0, 47).padEnd(47)} ║
 * ╚══════════════════════════════════════════════════════════╝
 *
 * INSTRUCTIONS D'UTILISATION :
 * 1. Ouvre Google Drive → Nouveau → Google Apps Script
 * 2. Colle l'intégralité de ce code (remplace le contenu existant)
 * 3. Clique sur ▶ Exécuter → buildForm
 * 4. Autorise les permissions demandées
 * 5. Le formulaire apparaît dans ton Google Drive
 */

function buildForm() {
  var formTitle = '${formTitle.replace(/'/g, "\\'")}';
  var form = FormApp.create(formTitle);

  // ── Configuration générale ──
  form.setDescription('Édumédiapole · Pack FPA · Généré le ${date}');
  form.setCollectEmail(false);
  form.setAllowResponseEdits(true);
  form.setLimitOneResponsePerUser(false);
  form.setShowLinkToRespondAgain(true);
  form.setProgressBar(true);
  form.setShuffleQuestions(false);
${headerSection}
${criteriaLines}
${footerSection}

  // ── Confirmation ──
  form.setConfirmationMessage('✅ Réponse enregistrée. Merci pour ton retour.');

  // ── Log de l'URL ──
  var url = form.getPublishedUrl();
  var editUrl = form.getEditUrl();
  Logger.log('✅ Formulaire créé avec succès !');
  Logger.log('🔗 URL de réponse : ' + url);
  Logger.log('✏️  URL d\\'édition  : ' + editUrl);

  // ── Optionnel : affichage dans une popup ──
  var ui = SpreadsheetApp.getUi ? SpreadsheetApp.getUi() : null;
  if (ui) {
    ui.alert('Formulaire créé !\\n\\nURL : ' + url);
  }

  return form;
}`;
}

        </div>
        <div class="modal-step">

      </div>

      <div class="modal-body">
        <div class="modal-code-wrap">

function switchFormsTab(type) {
  const modal = document.getElementById('forms-modal');
  if (!modal) return;
  const script = modal._scripts[type];
  document.getElementById('forms-script-display').textContent = script;
  document.getElementById('forms-source-alert').innerHTML =
    `<strong>Source utilisée :</strong> ${escapeHtml(modal._sourceInfo[type])}. Le tableau "Contexte d'évaluation" est ignoré pour générer les critères.`;
  document.getElementById('tab-formateur').classList.toggle('active', type === 'formateur');
  document.getElementById('tab-autoeval').classList.toggle('active', type === 'autoeval');
}

function copyFormsScript() {
  const code = document.getElementById('forms-script-display').textContent;
  navigator.clipboard.writeText(code)
    .then(() => showToast('📋 Script copié !', 'success'))
    .catch(() => showToast('❌ Impossible de copier', 'error'));
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}


function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3200);
}

// ─────────────────────────────────────────────
// KEYBOARD SHORTCUTS
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  // Escape → accueil
  if (e.key === 'Escape' && currentSkill) { goHome(); return; }

  // Alt+← → retour
  if (e.altKey && e.key === 'ArrowLeft') { goBack(); return; }

  // Alt+← / → dans la chaîne
  if (!e.altKey) return;
  if (!currentSkill || activeChain.length <= 1) return;
  const idx = activeChain.indexOf(currentSkill.id);
  if (e.key === 'ArrowRight' && idx < activeChain.length - 1) {
    selectSkill(activeChain[idx + 1]);
  }
  if (e.key === 'ArrowLeft' && idx > 0) {
    selectSkill(activeChain[idx - 1]);
  }
});

## 8. Bonnes pratiques

### Organisation
- Suivez la chaîne recommandée (**INTRO → M0 → M1 → M4 → M5 → M6**) pour des livrables cohérents entre eux.
- Chaque module conserve automatiquement son **dernier livrable généré** dans votre navigateur (bannière « Revoir le livrable »), même après fermeture de l'onglet. Une nouvelle génération sur le même module remplace l'ancienne — exportez (PDF/DOCX/Copier) ce que vous voulez garder durablement.
- Commencez par **INTRO** si vous découvrez la méthode EVFC.

### Qualité des saisies
- Soyez précis dans vos champs : l'IA produit un résultat directement proportionnel à la qualité des informations fournies.
- Utilisez des **compétences observables** : préférez « Rédiger une fiche de paie en respectant les rubriques légales » à « Comprendre la paie ».
- Fournissez un **contexte professionnel fictif mais réaliste** : cela ancre les scénarios dans la réalité.

### Gestion des coûts
- Utilisez **Haiku 4.5** pour les tâches simples (grilles, prompts) — c'est le modèle le moins coûteux.
- Évitez **Opus 4.8** pour les tâches pédagogiques courantes : le gain de qualité est négligeable par rapport au surcoût.
- Consultez votre tableau de bord de consommation sur [console.anthropic.com](https://console.anthropic.com).

### Sécurité
- Ne partagez jamais votre clé API : elle est liée à votre compte et votre facturation.
- Sur un ordinateur partagé, cliquez sur **🗑 Effacer** dans la modale de clé API avant de quitter.
- Votre clé n'est jamais transmise à Édumédiapole — elle part directement de votre navigateur vers Anthropic.

### Productivité
- Utilisez les **boutons de pré-remplissage** entre modules pour éviter de ressaisir les mêmes informations.
- Raccourci **\`Alt + →\`** : module suivant dans la chaîne.
- Masquez le panneau latéral (\`◀\`) pour agrandir la zone de lecture.
- Utilisez le **bouton 📋 Copier** sur les blocs de code pour copier sans erreur de formatage.

##### 1. Philosophie de la formation : du technicien au révélateur de consciences

La formation des adultes est un acte éminemment "politique" : elle ne vise pas l'adaptation de l'individu à un système productif, mais son émancipation par le savoir. L'ingénieur pédagogique doit rompre avec la standardisation, ces "slides soporifiques" qui anesthésient la pensée, pour devenir un architecte de la liberté.

Le facteur critique de succès de tout dispositif réside dans la prise en compte du vécu de l'apprenant. L'adulte n'est pas une page blanche ; il arrive avec une "richesse d'expérience" qui doit servir de matériau pédagogique brut.

- **Le concept d'urgence douce :** l'adulte n'a plus le luxe du temps. Pressé par ses responsabilités, il exige une efficacité immédiate, mais son apprentissage nécessite une profondeur de sens et une bienveillance du cadre.
- **L'espace respirable :** fidèle à Montessori, l'ingénierie doit façonner des environnements où l'autonomie est la règle. Un espace respirable sacralise les pauses réflexives et les échanges.
- **L'humour comme outil cognitif :** le rire est un levier d'ancrage puissant. Un adulte qui rit dédramatise l'enjeu, libère sa charge cognitive et autorise de nouvelles connexions.

*Comprendre l'adulte exige une structure d'ingénierie robuste capable de transformer ce vécu en compétence transférable.*

##### 3. Le cadre théorique : l'hybridation EVFC x Kolb

Pour garantir une appropriation totale, nous fusionnons la narration humaine de la méthode **EVFC** (Écouter, Voir, Faire, Consolider) avec la rigueur du **Cycle de Kolb**. Cette hybridation s'appuie sur deux tensions fondamentales de l'apprentissage : l'**Axe Vertical de la Perception** (Ressenti/Feel vs Pensée/Think) et l'**Axe Horizontal du Traitement** (Action/Do vs Observation/Watch).

**Matrice de correspondance stratégique**

| Phase de Kolb | Phase EVFC | Intention pédagogique & activité |
|---|---|---|
| **Expérience concrète** (Perceiving - Feel) | **VOIR (Le vertige)** | Susciter le vertige initial par un choc visuel ou un échec fécond. On sollicite le ressenti brut. |
| **Observation réfléchie** (Processing - Watch) | **ÉCOUTER / VOIR (Le miroir)** | Analyser les résultats. Le formateur agit en pair socratique pour faire émerger les premiers constats. |
| **Conceptualisation abstraite** (Perceiving - Think) | **ÉCOUTER (Les clés)** | Apporter les modèles et métaphores Feynman. Transformer l'étonnement en structures logiques. |
| **Expérimentation active** (Processing - Do) | **FAIRE (Le levier)** | Tester les théories sur un projet réel. Transformer le savoir en outil de liberté. |

La phase **Consolider** d'EVFC agit comme le liant métacognitif : elle reboucle le cycle en transformant l'action en une nouvelle expérience enrichie. Cette structure satisfait tous les profils : du *Divergent* au *Assimilateur*, jusqu'au *Convergent* et à l'*Accommodateur*.

*Cette matrice se décline en deux architectures selon les besoins du terrain.*

##### 4. Architectures de séance : le labo vs l'éveil

Le choix de l'architecture dépend de la complexité de l'objectif et de la maturité des apprenants.

- **Option 1 : le labo des résonances (l'immersif) :** Écouter > Voir > Faire > Consolider. Cette structure progressive commence par le récit pour rassurer et ancrer les bases avant de passer à l'action.
- **Option 2 : l'éveil par le défi (le cycle inversé) :** Voir > Écouter > Faire > Consolider. On provoque un vertige initial en confrontant l'apprenant à un résultat final vibrant ou à une situation de crise.

**Guide de choix pour l'ingénieur pédagogique**

| Caractéristique | Le labo des résonances | L'éveil par le défi |
|---|---|---|
| **Dynamique** | Sécuriser et accompagner | Provoquer et électriser |
| **Postulat** | Construire la confiance | Briser les vieux réflexes |
| **Action Formateur** | Ancrer par le récit de pair | Déclencher par le défi |
| **Résultat visé** | Stabiliser les savoir-faire | Transformer la posture |

##### 5. Le "bac à sable de l'audace" : transformer le savoir en levier

La phase **FAIRE** n'est jamais une répétition mécanique ; c'est un laboratoire d'audace où le droit à l'erreur est sacralisé.

**L'exemple du prompt IA :** plutôt que de dicter une méthode, on commence par un échec vécu. On donne un brief flou ("Préparez un message client"). L'apprenant constate la pauvreté du résultat. On introduit alors la **perturbation** : "Seuls les clients du module Reporting sont concernés, la coupure est mardi de 8h à 10h, n'appelez pas le support." Cette contrainte force l'apprenant à quitter sa posture d'automate pour utiliser la méthode comme un levier de précision.

Pour structurer cette pensée en action, l'apprenant utilise la **Matrice de Questionnement** :

- **Contexte & public :** qui sommes-nous et à qui parlons-nous ?
- **Objectif & format :** quel est le but précis et la forme attendue ?
- **Données & contraintes :** quelles informations sont vérifiées et quelles sont les limites ?
- **Risques :** qu'est-ce qui pourrait être faux ou non validé ?
- **Critères :** comment savoir si la sortie est excellente ?

##### 6. Évaluation et sacralisation : le bilan de l'audace

L'évaluation ne mesure plus la conformité, mais la transformation intérieure. Elle se ritualise dans un **Cercle d'Échange** final où l'on valide le "Parcours de Conscience".

L'outil central est l'**Échelle du Feu Intérieur (1 à 5)** : l'apprenant évalue la résonance de chaque phase (Écouter, Voir, Faire, Consolider) sur son propre développement. Ce bilan sacralisé repose sur quatre piliers :

1. **L'erreur féconde :** l'identification de l'échec le plus instructif.
2. **Le saut dans le vide :** ce qui a été tenté par pure audace technique.
3. **Le rire pédagogique :** le moment où l'humour a débloqué une tension cognitive.
4. **L'engagement d'audace :** ce que l'apprenant s'autorise à rater demain pour grandir.

*"La connaissance n'est pas une destination, c'est le mouvement perpétuel entre l'action et la conscience."*

Ce mouvement transforme l'expérience brute en une sagesse professionnelle renouvelée.

##### 7. Conclusion : vers une ingénierie de la liberté

L'hybridation EVFC-Kolb n'est pas une simple technique, c'est un standard d'excellence pour les formateurs qui souhaitent honorer la dignité de l'adulte. En alliant la structure cyclique de la cognition à la narration émancipatrice, nous créons des dispositifs qui ne forment pas pour adapter, mais pour libérer.

La recommandation ultime pour tout ingénieur pédagogique est d'incarner cette méthode : il faut avoir vécu soi-même le vertige et le rire de l'apprentissage pour être capable, à son tour, de révéler les consciences.
`;
