function switchFormsTab(type) {
  const modal = document.getElementById('forms-modal');
  if (!modal) return;
  const script = modal._scripts[type];
  document.getElementById('forms-script-display').textContent = script;
  document.getElementById('tab-formateur').classList.toggle('active', type === 'formateur');
  document.getElementById('tab-autoeval').classList.toggle('active', type === 'autoeval');
}

function copyFormsScript() {
  const code = document.getElementById('forms-script-display').textContent;
  navigator.clipboard.writeText(code)
    .then(() => showToast('📋 Script copié !', 'success'))
    .catch(() => showToast('❌ Impossible de copier', 'error'));
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}


function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3200);
}

  // Escape → accueil
  if (e.key === 'Escape' && currentSkill) { goHome(); return; }

  // Alt+← → retour
  if (e.altKey && e.key === 'ArrowLeft') { goBack(); return; }

  // Alt+← / → dans la chaîne
  if (!e.altKey) return;
  if (!currentSkill || activeChain.length <= 1) return;
  const idx = activeChain.indexOf(currentSkill.id);
  if (e.key === 'ArrowRight' && idx < activeChain.length - 1) {
    selectSkill(activeChain[idx + 1]);

  if (e.key === 'ArrowLeft' && idx > 0) {
    selectSkill(activeChain[idx - 1]);

});

## 1. Présentation générale

Le **Formateur Augmenté EVFC** est un outil web pédagogique qui permet à un formateur de générer automatiquement, grâce à l'intelligence artificielle, l'ensemble des documents nécessaires à la conception d'une formation professionnelle.

L'application repose sur la méthode **EVFC** — un cadre pédagogique structuré en quatre phases :

- **É**couter : apports théoriques transmis aux apprenants
- **V**oir : démonstration commentée par le formateur
- **F**aire : mise en pratique par les apprenants
- **C**onsolider : synthèse, transfert et validation des acquis

En quelques minutes, et sans compétences techniques particulières, le formateur peut produire une séquence pédagogique complète, des scénarios de mise en situation, des grilles d'évaluation, des questionnaires, et bien plus encore.

## 8. Bonnes pratiques

### Organisation
- Suivez la chaîne recommandée (**INTRO → M0 → M1 → M4 → M5 → M6**) pour des livrables cohérents entre eux.
- Exportez chaque livrable dès qu'il vous convient : les résultats sont conservés en mémoire pendant votre session, mais disparaissent si vous fermez l'onglet.
- Commencez par **INTRO** si vous découvrez la méthode EVFC.

### Qualité des saisies
- Soyez précis dans vos champs : l'IA produit un résultat directement proportionnel à la qualité des informations fournies.
- Utilisez des **compétences observables** : préférez « Rédiger une fiche de paie en respectant les rubriques légales » à « Comprendre la paie ».
- Fournissez un **contexte professionnel fictif mais réaliste** : cela ancre les scénarios dans la réalité.

### Gestion des coûts
- Utilisez **Haiku 4.5** pour les tâches simples (grilles, prompts) — c'est le modèle le moins coûteux.
- Évitez **Opus 4.8** pour les tâches pédagogiques courantes : le gain de qualité est négligeable par rapport au surcoût.
- Consultez votre tableau de bord de consommation sur [console.anthropic.com](https://console.anthropic.com).

### Sécurité
- Ne partagez jamais votre clé API : elle est liée à votre compte et votre facturation.
- Sur un ordinateur partagé, cliquez sur **🗑 Effacer** dans la modale de clé API avant de quitter.
- Votre clé n'est jamais transmise à Édumédiapole — elle part directement de votre navigateur vers Anthropic.

### Productivité
- Utilisez les **boutons de pré-remplissage** entre modules pour éviter de ressaisir les mêmes informations.
- Raccourci **\`Alt + →\`** : module suivant dans la chaîne.
- Masquez le panneau latéral (\`◀\`) pour agrandir la zone de lecture.
- Utilisez le **bouton 📋 Copier** sur les blocs de code pour copier sans erreur de formatage.

---

## 9. Problèmes fréquents et solutions

| Problème | Cause possible | Solution |
|----------|---------------|----------|
| « Clé invalide — doit commencer par sk- » | Clé incomplète ou copiée avec des espaces | Créez une nouvelle clé sur console.anthropic.com |
| La génération ne démarre pas | Clé API absente ou invalide | Vérifiez la clé via le bouton 🔑 |
| La génération tourne sans s'arrêter | Connexion internet ou délai de l'API | Attendez 60 s, puis rechargez la page |
| Le livrable est vide ou très court | Champs remplis trop brièvement | Recommencez avec des descriptions plus détaillées |
| Les champs sont encadrés en rouge | Champs obligatoires (*) non remplis | Remplissez tous les champs marqués d'un astérisque |
| Le PDF ne se télécharge pas | Bloqueur du navigateur | Autorisez les téléchargements depuis ce site |
| Le DOCX ne s'ouvre pas correctement | Version ancienne de Word | Mettez à jour ou ouvrez avec Word en ligne |
| Le résultat a disparu après navigation | Comportement normal (mémoire de session) | Exportez chaque livrable immédiatement après génération |
| Le bouton « Utiliser M1 » n'apparaît pas en M3 | Aucun livrable M1 n'a été généré | Générez d'abord une séquence en M1, puis revenez en M3 |
| Résultats en anglais | Rare anomalie de l'IA | Ajoutez « Réponds uniquement en français » dans vos champs |

---

## 10. Résumé de prise en main rapide

### Les 5 actions à connaître absolument

1. **Obtenir et saisir votre clé API Anthropic** — sans elle, rien ne fonctionne (bouton 🔑)
2. **Choisir le bon module** selon ce que vous souhaitez produire (voir tableau section 3)
3. **Remplir les champs avec précision** — la qualité du livrable dépend de la qualité de vos saisies
4. **Cliquer sur « ⚡ Générer »** et patienter quelques secondes
5. **Exporter le livrable** immédiatement (PDF, DOCX ou Copier)

### Les 3 erreurs à éviter

1. **Saisir une compétence vague** → préférez une formulation précise et observable
2. **Fermer l'onglet sans exporter** → les résultats ne sont pas sauvegardés automatiquement entre sessions
3. **Utiliser Opus 4.8 par défaut** → plus lent, plus coûteux, sans avantage sur les tâches pédagogiques courantes

### Le meilleur parcours pour démarrer

\`\`\`
1. Obtenir sa clé API sur console.anthropic.com
2. La saisir dans l'application (bouton 🔑)
3. Ouvrir le module INTRO
4. Saisir son secteur et son type de formation
5. Cliquer sur Générer → lire et explorer le résultat
6. Enchaîner vers M1 pour créer sa première séquence EVFC
7. Exporter en PDF
\`\`\`
