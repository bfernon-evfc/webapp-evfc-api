<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVFC — Formateur Augmenté | Édumédiapole</title>

<!-- Marked.js for Markdown rendering -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- html2canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- docx.js chargé dynamiquement à la demande dans exportDOCX() -->

<style>
  :root {
    --navy: #002455;
    --navy-light: #003580;
    --red: #F0322C;
    --red-soft: #ff5a56;

    /* Light mode */
    --bg: #f4f6fa;
    --bg-card: #ffffff;
    --bg-sidebar: #ffffff;
    --bg-header: #002455;
    --text: #1a1a2e;
    --text-muted: #5a6a8a;
    --text-header: #ffffff;
    --border: #dde3f0;
    --hover: #eef1f9;
    --result-bg: #f8faff;
    --badge-bg: #e8eeff;
    --badge-text: #002455;
    --input-bg: #f8faff;
    --category-badge-bg: rgba(0, 36, 85, 0.09);
    --category-badge-border: rgba(0, 36, 85, 0.22);
    --category-badge-text: #002455;
    --shadow: 0 2px 12px rgba(0,36,85,0.08);
    --shadow-card: 0 4px 20px rgba(0,36,85,0.10);
    --tag-intro: #7c3aed;
    --tag-m0: #0891b2;
    --tag-m1: #0284c7;
    --tag-m2: #7c3aed;
    --tag-m3: #059669;
    --tag-m4: #d97706;
    --tag-m5: #dc2626;
    --tag-m6: #db2777;
    --tag-m7: #374151;
    --chain-bg: #fffbeb;
    --chain-border: #fcd34d;
  }

  [data-theme="dark"] {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-sidebar: #161b22;
    --bg-header: #010c1f;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-header: #ffffff;
    --border: #30363d;
    --hover: #21262d;
    --result-bg: #0d1117;
    --badge-bg: #1f2d4a;
    --badge-text: #7eb3f7;
    --input-bg: #0d1117;
    --category-badge-bg: rgba(126, 179, 247, 0.14);
    --category-badge-border: rgba(126, 179, 247, 0.34);
    --category-badge-text: #9cc8ff;
    --shadow: 0 2px 12px rgba(0,0,0,0.4);
    --shadow-card: 0 4px 20px rgba(0,0,0,0.5);
    --chain-bg: #1a1600;
    --chain-border: #78350f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* HEADER */
  .app-footer {
    text-align: center;
    padding: 14px 24px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    background: var(--bg-header);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  header {
    background: var(--bg-header);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .header-brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo {
    height: 42px;
    width: auto;
    object-fit: contain;
    display: block;
    background: #ffffff;
    border-radius: 8px;
    padding: 4px 10px;
  }

  .header-title {
    color: white;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }

  .header-sub {
    color: rgba(255,255,255,0.55);
    font-size: 11px;
    font-weight: 400;
  }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn-theme {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-theme:hover { background: rgba(255,255,255,0.18); }

  .btn-help {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: white; border-radius: 8px; padding: 7px 14px;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px; font-family: inherit;
  }
  .btn-help span:first-child {
    font-size: 14px; font-weight: 800;
    width: 18px; height: 18px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .btn-help:hover { background: rgba(255,255,255,0.18); }

  .version-badge {
    background: var(--red);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  /* LAYOUT */
  .app-layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: calc(100vh - 60px);
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .sidebar-section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--category-badge-text);
    background: var(--category-badge-bg);
    border: 1px solid var(--category-badge-border);
    border-radius: 999px;
    padding: 5px 10px;
    margin: 10px 2px 6px;
    width: fit-content;
    max-width: calc(100% - 4px);
    line-height: 1.2;
    box-shadow: 0 1px 4px rgba(0,36,85,0.08);
  }

  .skill-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.18s;
    background: var(--bg-card);
    position: relative;
    overflow: hidden;
  }

  .skill-card:hover {
    background: var(--hover);
    border-color: var(--navy-light);
    transform: translateX(2px);
  }

  .method-card {
    border-color: rgba(15, 76, 129, 0.35);
    background: linear-gradient(135deg, rgba(15, 76, 129, 0.08), rgba(240, 50, 44, 0.06));
  }

  .method-card .skill-desc {
    color: var(--text);
  }

  [data-theme="dark"] .method-card {
    background: linear-gradient(135deg, rgba(126, 179, 247, 0.12), rgba(255, 105, 97, 0.08));
  }

  .skill-card.active {
    border-color: var(--navy);
    background: var(--badge-bg);
    box-shadow: var(--shadow);
  }

  .skill-card.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--red);
    border-radius: 3px 0 0 3px;
  }

  .skill-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .skill-badge {
    font-size: 10px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 20px;
    color: white;
    flex-shrink: 0;
  }

  .evfc-color-badge {
    display: inline-flex;
    gap: 3px;
    align-items: center;
    background: #ffffff;
    border: 1px solid rgba(15, 76, 129, 0.28);
    box-shadow: 0 1px 4px rgba(15, 76, 129, 0.12);
    padding: 4px 8px;
    font-size: 13px;
    letter-spacing: 0.4px;
  }

  .evfc-color-badge span {
    line-height: 1;
  }

  .evfc-color-badge .evfc-e { color: #2563eb; }
  .evfc-color-badge .evfc-v { color: #16a34a; }
  .evfc-color-badge .evfc-f { color: #f97316; }
  .evfc-color-badge .evfc-c { color: #7c3aed; }

  [data-theme="dark"] .evfc-color-badge {
    background: #f8fafc;
    border-color: rgba(126, 179, 247, 0.55);
    box-shadow: 0 1px 8px rgba(126, 179, 247, 0.18);
  }

  .era-color-badge {
    display: inline-flex;
    gap: 3px;
    align-items: center;
    background: #ffffff;
    border: 1px solid rgba(219, 39, 119, 0.28);
    box-shadow: 0 1px 4px rgba(219, 39, 119, 0.14);
    padding: 4px 8px;
    font-size: 13px;
    letter-spacing: 0.4px;
  }

  .era-color-badge span { line-height: 1; }
  .era-color-badge .era-e { color: #2563eb; }
  .era-color-badge .era-r { color: #dc2626; }
  .era-color-badge .era-a { color: #16a34a; }

  [data-theme="dark"] .era-color-badge {
    background: #f8fafc;
    border-color: rgba(244, 114, 182, 0.55);
    box-shadow: 0 1px 8px rgba(244, 114, 182, 0.18);
  }

  .skill-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .skill-desc {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-top: 2px;
  }

  .beta-badge {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 1px 5px;
    border-radius: 20px;
    background: #fef3c7;
    color: #92400e;
    border: 1px solid #fcd34d;
    flex-shrink: 0;
  }
  [data-theme="dark"] .beta-badge { background: #451a03; color: #fcd34d; border-color: #92400e; }

  .welcome-card-beta {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 20px;
    background: #fef3c7;
    color: #92400e;
    border: 1px solid #fcd34d;
    margin-left: 4px;
    vertical-align: middle;
  }
  [data-theme="dark"] .welcome-card-beta { background: #451a03; color: #fcd34d; border-color: #92400e; }

  .main-content {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .skill-panel {
    padding: 24px;
    flex: 1;
    overflow-y: auto;
  }

  .panel-header {
    margin-bottom: 20px;
  }

  .panel-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .panel-module-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    color: white;
  }

  .panel-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--navy);
    line-height: 1.2;
    margin-bottom: 6px;
  }

  [data-theme="dark"] .panel-title { color: #7eb3f7; }

  .panel-desc {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 700px;
  }

  /* CHAIN SUGGESTION */
  .chain-block {
    background: var(--chain-bg);
    border: 1px solid var(--chain-border);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .chain-label {
    font-size: 11px;
    font-weight: 700;
    color: #92400e;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  [data-theme="dark"] .chain-label { color: #fcd34d; }

  .chain-items {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .chain-item {
    font-size: 11px;
    background: rgba(0,36,85,0.08);
    border: 1px solid rgba(0,36,85,0.15);
    color: var(--navy);
    padding: 3px 8px;
    border-radius: 5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  [data-theme="dark"] .chain-item {
    background: rgba(126,179,247,0.1);
    border-color: rgba(126,179,247,0.2);
    color: #7eb3f7;
  }

  .chain-item:hover { opacity: 0.7; }
  .chain-arrow { color: var(--text-muted); font-size: 12px; }

  /* INPUT FORM */
  .input-grid {
    display: grid;
    gap: 14px;
    margin-bottom: 20px;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .field-required {
    color: var(--red);
    margin-left: 2px;
  }

  input[type="text"], textarea, select {
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    color: var(--text);
    font-family: inherit;
    transition: border-color 0.2s;
    width: 100%;
    resize: vertical;
  }

  input[type="text"]:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--navy);
  }

  textarea { min-height: 90px; }

  select option { background: var(--bg-card); }

  .input-hint {
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
  }

  /* GENERATE BUTTON */
  .btn-generate {
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px 28px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-generate:hover { background: var(--navy-light); transform: translateY(-1px); box-shadow: var(--shadow-card); }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .btn-generate .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  .btn-generate.loading .spinner { display: block; }
  .btn-generate.loading .btn-text { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .generation-controls {
    display: grid;
    grid-template-columns: minmax(180px, 1fr) minmax(180px, 1fr) auto auto;
    gap: 12px;
    align-items: end;
    margin-bottom: 12px;
  }

  .token-control,
  .temperature-control {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .token-control label,
  .temperature-control label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .btn-copy-prompt {
    min-height: 42px;
    padding: 0 16px;
    border-radius: 9px;
    border: 1.5px solid var(--navy);
    background: var(--bg-card);
    color: var(--navy);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-copy-prompt:hover {
    background: var(--navy);
    color: white;
  }

  [data-theme="dark"] .btn-copy-prompt {
    border-color: #7eb3f7;
    color: #7eb3f7;
  }

  [data-theme="dark"] .btn-copy-prompt:hover {
    background: #7eb3f7;
    color: #0d1117;
  }

  .btn-dev-reco {
    min-height: 42px;
    padding: 0 14px;
    border-radius: 9px;
    border: 1.5px solid rgba(249, 115, 22, 0.55);
    background: rgba(249, 115, 22, 0.12);
    color: #c2410c;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    position: relative;
  }

  .btn-dev-reco:hover {
    border-color: #f97316;
    background: rgba(249, 115, 22, 0.18);
    transform: translateY(-1px);
  }

  .btn-dev-reco.selected {
    border-color: rgba(22, 163, 74, 0.6);
    background: rgba(22, 163, 74, 0.14);
    color: #15803d;
  }

  .btn-dev-reco.selected:hover {
    border-color: #16a34a;
    background: rgba(22, 163, 74, 0.2);
  }

  .btn-dev-reco::after {
    content: attr(data-tooltip);
    position: absolute;
    left: 50%;
    bottom: calc(100% + 10px);
    transform: translateX(-50%);
    width: 240px;
    padding: 8px 10px;
    border-radius: 8px;
    background: #111827;
    color: #fff;
    font-size: 11px;
    font-weight: 500;
    line-height: 1.35;
    white-space: normal;
    box-shadow: var(--shadow-card);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s, transform 0.15s;
    z-index: 20;
  }

  .btn-dev-reco:hover::after,
  .btn-dev-reco:focus-visible::after {
    opacity: 1;
    transform: translateX(-50%) translateY(-2px);
  }

  [data-theme="dark"] .btn-dev-reco {
    border-color: rgba(251, 146, 60, 0.62);
    background: rgba(251, 146, 60, 0.18);
    color: #fed7aa;
  }

  [data-theme="dark"] .btn-dev-reco.selected {
    border-color: rgba(74, 222, 128, 0.68);
    background: rgba(34, 197, 94, 0.18);
    color: #bbf7d0;
  }

  /* RESTORE BANNER */
  .restore-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 10px;
    background: var(--hover);
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-muted);
  }
  .restore-btn {
    flex-shrink: 0;
    padding: 5px 14px;
    border-radius: 8px;
    border: 1px solid var(--navy);
    background: transparent;
    color: var(--navy);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .restore-btn:hover { background: var(--navy); color: white; }
  [data-theme="dark"] .restore-btn { border-color: #7eb3f7; color: #7eb3f7; }
  [data-theme="dark"] .restore-btn:hover { background: #7eb3f7; color: #0d1117; }

  /* RESULT ZONE */
  .result-zone {
    margin-top: 24px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--bg-card);
    box-shadow: var(--shadow);
  }

  .result-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--result-bg);
    flex-wrap: wrap;
    gap: 8px;
  }

  .result-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .result-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
    animation: pulse 2s ease-in-out infinite;
  }

  .result-model-hint {
    padding: 2px 16px 0;
    font-size: 11px;
    color: var(--text-muted);
    opacity: 0.75;
    display: flex;
    align-items: center;
    gap: 7px;
    flex-wrap: wrap;
  }

  .result-usage-hint {
    opacity: 0.85;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .result-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .btn-action {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    border-radius: 7px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    transition: all 0.15s;
  }

  .btn-action:hover { background: var(--hover); border-color: var(--navy); }

  .btn-action.copy { color: var(--navy); }
  .btn-action.pdf { color: var(--red); border-color: rgba(240,50,44,0.3); }
  .btn-action.docx { color: #1D6F42; border-color: rgba(29,111,66,0.3); }
  .btn-action.pdf:hover { background: rgba(240,50,44,0.05); }
  .btn-action.docx:hover { background: rgba(29,111,66,0.05); }

  .result-body {
    padding: 24px;
    max-height: 60vh;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }

  .result-body h1, .result-body h2, .result-body h3 {
    color: var(--navy);
    margin: 16px 0 8px;
    font-weight: 700;
  }

  [data-theme="dark"] .result-body h1,

  .result-body h1 { font-size: 20px; border-bottom: 2px solid var(--border); padding-bottom: 8px; }

  .result-body p { margin-bottom: 10px; }
  .result-body ul, .result-body ol { margin: 8px 0 10px 20px; }
  .result-body li { margin-bottom: 4px; }

  .result-body table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 13px;
  }

  .result-body th {

  .result-body code {

  .m3-copy-alert {

  }
  [data-theme="dark"] .m3-copy-alert {

    color: #fed7aa;
  }
  [data-theme="dark"] .m3-copy-alert strong,
  [data-theme="dark"] .m3-copy-alert code { color: #ffedd5; }

  /* ── Lettres EVFC colorées ─────────────────────────────── */
  .evfc-e { color: #0284c7; font-weight: 700; }
  .evfc-v { color: #16a34a; font-weight: 700; }
  .evfc-f { color: #ea580c; font-weight: 700; }
  .evfc-c { color: #7c3aed; font-weight: 700; }

  [data-theme="dark"] .evfc-v { color: #4ade80; }
  [data-theme="dark"] .evfc-f { color: #fb923c; }
  [data-theme="dark"] .evfc-c { color: #c084fc; }

  .on-dark .evfc-v { color: #86efac; }
  .on-dark .evfc-f { color: #fdba74; }
  .on-dark .evfc-c { color: #d8b4fe; }

  /* ── Badges Pack EVFC dans le label livrable ───────────── */
  .pack-skill-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 5px;
  }
  .pack-skill-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 4px;
    border: 1px solid currentColor;
    opacity: 0.85;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  /* ── "Claude" gras orange dans M2 ──────────────────────── */
  .claude-highlight { color: #ea580c; font-weight: 700; }

  /* Badge "Prompt Claude" affiché sur les blocs <pre> du module M2 */
  .prompt-claude-badge {
    position: absolute;
    top: 8px;
    left: 10px;
    background: #ea580c;
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.03em;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .result-body pre:hover .prompt-claude-badge { opacity: 1; }

  /* Bandeau contextuel M2 */
  .m2-context-banner {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: #E8F0FA;
    border-left: 4px solid #002455;
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    margin-bottom: 18px;
    font-size: 13px;
    color: #002455;
    line-height: 1.55;
  }
  .m2-context-banner .m2-banner-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
  .m2-context-banner strong { display: block; margin-bottom: 3px; font-size: 13.5px; }

  /* Note de bas de livrable M2 */
  .m2-footer-note {
    margin-top: 22px;
    padding: 12px 16px;
    background: #f3f0ff;
    border: 1px solid #c4b5fd;

    color: #4c1d95;
    line-height: 1.6;
  }

  .result-body pre code {
    background: none;
    color: var(--text);
    padding: 0;
  }

  .result-body blockquote {
    border-left: 3px solid var(--red);
    padding: 8px 16px;
    margin: 12px 0;
    background: rgba(240,50,44,0.05);

  .result-body strong { color: var(--navy); font-weight: 700; }

  /* EMPTY STATE */

  }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .empty-state p { font-size: 14px; }

  /* WELCOME SCREEN */
  .welcome-screen {
    padding: 32px;
    max-width: 800px;
  }

  .welcome-logo-frame {
    background: #ffffff;
    border: 1px solid rgba(0, 36, 85, 0.12);
    border-radius: 18px;
    padding: 14px;
    box-shadow: var(--shadow-card);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .welcome-logo-frame img {
    height: 200px;
    width: auto;
    display: block;
  }

  [data-theme="dark"] .welcome-logo-frame {
    border-color: rgba(126, 179, 247, 0.28);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
  }

  .welcome-slogan { display: flex; flex-direction: column; gap: 12px; }
  .welcome-slogan-main {
    font-size: 36px; font-weight: 900; line-height: 1.15;
    color: var(--navy); letter-spacing: -0.5px;
  }
  [data-theme="dark"] .welcome-slogan-main { color: #7eb3f7; }
  .welcome-slogan-sub {
    font-size: 16px; font-weight: 500; color: var(--text-muted);
    line-height: 1.4; letter-spacing: 0.1px;
  }

  .welcome-title {
    font-size: 28px;
    font-weight: 900;
    color: var(--navy);
    line-height: 1.2;
    margin-bottom: 8px;
  }

  [data-theme="dark"] .welcome-title { color: #7eb3f7; }

  .welcome-sub {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 32px;
    line-height: 1.6;
  }

    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));

    margin-bottom: 32px;
  }

  .welcome-card {
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;

  }

  .welcome-card:hover {
    border-color: var(--navy);
    box-shadow: var(--shadow-card);
    transform: translateY(-2px);
  }

  .welcome-card-badge {
    font-size: 10px;
    font-weight: 800;
    padding: 3px 8px;
    border-radius: 20px;
    color: white;
    display: inline-block;
    margin-bottom: 8px;
  }

  .welcome-card-title {
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--text);
  }

  .welcome-card-desc {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* MODEL RECO BANNER */
  .model-reco-banner {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 10px; margin-bottom: 16px;
    border: 1.5px solid; font-size: 12px;
  }
  .model-reco-icon { font-size: 16px; flex-shrink: 0; }
  .model-reco-body { display: flex; flex-direction: column; gap: 2px; }
  .model-reco-label {
    font-size: 10px; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.6px; opacity: 0.8;
  }
  .model-reco-text { font-size: 12px; font-weight: 600; line-height: 1.4; }
  .model-reco-action {
    margin-left: auto; flex-shrink: 0;
    padding: 5px 10px; border-radius: 6px; font-size: 11px;
    font-weight: 700; cursor: pointer; border: none; transition: opacity 0.2s;
  }
  .model-reco-action:hover { opacity: 0.8; }

  /* WELCOME MODEL SECTION */
  .welcome-model-section {
    background: var(--bg-card); border: 1.5px solid var(--border);
    border-radius: 12px; padding: 20px 24px; margin-top: 20px;
  }
  .welcome-model-title {
    font-size: 12px; font-weight: 800; text-transform: uppercase;

    display: flex; align-items: center; gap: 6px;

    display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 16px;
  }

  .welcome-model-card {
    border-radius: 10px; padding: 12px 14px; border: 1.5px solid;
  }
  .welcome-model-card.model-haiku {
    background: rgba(124, 58, 237, 0.05);
    border-color: rgba(124, 58, 237, 0.25);
    color: #7c3aed;
  }
  .welcome-model-card.model-sonnet {
    background: rgba(2, 132, 199, 0.05);
    border-color: rgba(2, 132, 199, 0.25);
    color: #0284c7;
  }
  .welcome-model-card.model-opus {
    background: rgba(180, 83, 9, 0.05);
    border-color: rgba(180, 83, 9, 0.25);
    color: #b45309;
  }
  .welcome-model-card-name { font-size: 13px; font-weight: 800; margin-bottom: 4px; }
  .welcome-model-card-id { font-size: 10px; opacity: 0.65; font-family: monospace; margin-bottom: 6px; }
  .welcome-model-card-desc { font-size: 11px; line-height: 1.45; opacity: 0.85; }
  .welcome-model-reco-table {
    width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 14px;
  }
  .welcome-model-reco-table th {
    text-align: left; padding: 6px 10px; font-size: 10px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
    border-bottom: 1.5px solid var(--border);
  }
  .welcome-model-reco-table td {
    padding: 7px 10px; border-bottom: 1px solid var(--border);
    vertical-align: middle; color: var(--text);
  }
  .welcome-model-reco-table tr:last-child td { border-bottom: none; }
  .welcome-model-badge {
    display: inline-block; border-radius: 20px; padding: 2px 8px;
    font-size: 10px; font-weight: 800; color: white;
  }
  .opus-warning {
    background: rgba(245,158,11,0.08); border: 1.5px solid rgba(245,158,11,0.35);
    border-radius: 10px; padding: 10px 14px; font-size: 12px;
    display: flex; align-items: flex-start; gap: 10px; line-height: 1.5;
    color: var(--text);
  }
  .opus-warning-icon { font-size: 18px; flex-shrink: 0; }

  /* CHAIN FLOW */
  .chain-flow {
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    margin-top: 20px;
  }

  .chain-flow-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .chain-flow-items {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .chain-flow-step {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chain-flow-btn {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    border: 1.5px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .chain-flow-btn:hover {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
  }

  .chain-flow-btn.current {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
  }

  .chain-flow-arrow {
    color: var(--text-muted);
    font-size: 14px;
  }

  /* NEXT STEP SUGGESTION */
  .next-step-block {
    margin-top: 16px;
    padding: 14px 18px;
    background: linear-gradient(135deg, rgba(0,36,85,0.05) 0%, rgba(240,50,44,0.05) 100%);
    border: 1.5px dashed var(--navy);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  [data-theme="dark"] .next-step-block { border-color: #7eb3f7; }

  .next-step-text {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }

  .next-step-text strong { color: var(--navy); }
  [data-theme="dark"] .next-step-text strong { color: #7eb3f7; }

  .next-step-actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn-next-step {
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;

    display: flex;
    align-items: center;
    gap: 6px;

  /* ── MODAL APPS SCRIPT ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal-box {
    background: var(--bg-card);
    border-radius: 14px;
    width: 100%;
    max-width: 760px;
    max-height: 88vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    overflow: hidden;
    animation: slideUp 0.22s ease;
  }

  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .modal-header {
    background: var(--navy);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;

  .modal-title {
    color: white;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .modal-tag {
    background: var(--red);
    color: white;
    font-size: 10px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .modal-close {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;

    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.25); }

  /* ── HELP MODAL ── */
  .help-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 300; display: flex; align-items: center; justify-content: center;
    padding: 16px; animation: fadeIn 0.2s ease;

  .help-dialog {
    background: var(--bg-card); border-radius: 14px;
    width: 100%; max-width: 980px; height: 90vh;
    display: flex; flex-direction: column;
    box-shadow: 0 28px 70px rgba(0,0,0,0.4);
    overflow: hidden; animation: slideUp 0.22s ease;
  }
  .help-header {
    background: var(--navy); padding: 14px 20px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }
  .help-header-title {
    color: white; font-size: 15px; font-weight: 700;
    display: flex; align-items: center; gap: 10px;
  }
  .help-layout {
    display: flex; flex: 1; overflow: hidden;
  }
  .help-toc {
    width: 220px; flex-shrink: 0; overflow-y: auto;
    border-right: 1px solid var(--border);

  .help-toc-link.active { color: var(--navy); font-weight: 700; border-left-color: var(--red); background: var(--bg-card); }

  [data-theme="dark"] .help-toc-link.active { color: #7eb3f7; }
  .help-content {
    flex: 1; overflow-y: auto; padding: 28px 36px;
  }
  /* Markdown styles inside help */
  .help-content h2 {
    font-size: 17px; font-weight: 800; color: var(--navy);
    border-bottom: 2px solid var(--red); padding-bottom: 8px;
    margin: 32px 0 14px; scroll-margin-top: 20px;

  .help-content h2:first-child { margin-top: 0; }
  .help-content h3 {
    font-size: 14px; font-weight: 700; color: var(--navy);
    margin: 20px 0 8px;
  }
  .help-content h4 {
    font-size: 13px; font-weight: 700; color: var(--text-muted);
    margin: 16px 0 6px; text-transform: uppercase; letter-spacing: 0.4px;
  }
  .help-content p { font-size: 13px; line-height: 1.65; margin-bottom: 10px; color: var(--text); }
  .help-content ul, .help-content ol {
    font-size: 13px; line-height: 1.65; padding-left: 20px;
    margin-bottom: 12px; color: var(--text);
  }
  .help-content li { margin-bottom: 4px; }
  .help-content strong { font-weight: 700; color: var(--text); }
  .help-content em { font-style: italic; }
  .help-content code {
    background: var(--hover); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 5px;
    font-family: monospace; font-size: 12px; color: var(--navy);
  }
  [data-theme="dark"] .help-content code { color: #7eb3f7; }
  .help-content pre {
    background: var(--hover); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px;
    font-family: monospace; font-size: 12px; overflow-x: auto;
    margin-bottom: 12px;
  }
  .help-content pre code { background: none; border: none; padding: 0; }
  .help-content blockquote {
    border-left: 3px solid var(--red); padding: 8px 14px;
    background: rgba(240,50,44,0.05); border-radius: 0 6px 6px 0;
    margin: 12px 0; font-size: 13px; color: var(--text-muted);
  }
  .help-content table {
    width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 16px;
  }
  .help-content th {
    background: var(--navy); color: white; text-align: left;
    padding: 8px 12px; font-weight: 700; font-size: 11px;
  }
  .help-content td {
    padding: 7px 12px; border-bottom: 1px solid var(--border); vertical-align: top;
  }
  .help-content tr:last-child td { border-bottom: none; }
  .help-content tr:nth-child(even) td { background: var(--hover); }
  .help-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  .modal-steps {
    padding: 14px 20px;
    background: var(--result-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .modal-step {
    display: flex;
